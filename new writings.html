<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>writings / azad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ee;--ink:#111110;--muted:#7a7870;--line:#dddbd4;--hover:#eceae3;--red:#c8451a;--green:#1a7a45;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:"EB Garamond",Georgia,serif;font-size:17px;line-height:1.6;}
nav{padding:28px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--line);}
.nav-left{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);}
.nav-right{font-family:"DM Mono",monospace;font-size:12px;display:flex;gap:28px;}
.nav-right a{color:var(--muted);text-decoration:none;}
.nav-right a.active{color:var(--ink);}
.page-header{padding:40px 48px 0;}
.page-header h1{font-family:"DM Mono",monospace;font-size:13px;font-weight:400;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.month-bar{padding:20px 48px 0;font-family:"DM Mono",monospace;font-size:11.5px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
.month-btn{cursor:pointer;padding:2px 0;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit;border-bottom:1px solid transparent;transition:color .15s;}
.month-btn:hover{color:var(--ink);}
.month-btn.active{color:var(--ink);border-bottom-color:var(--ink);}
.writings-container{padding:20px 48px 60px;max-width:900px;}
.writings-list{list-style:none;}
.writing-item{display:grid;grid-template-columns:72px 1fr auto;align-items:baseline;gap:0 20px;padding:13px 8px;border-bottom:0.5px solid var(--line);cursor:pointer;border-radius:3px;transition:background .1s;}
.writing-item:hover{background:var(--hover);}
.writing-date{font-family:"DM Mono",monospace;font-size:11.5px;color:var(--muted);white-space:nowrap;}
.writing-content{display:flex;flex-direction:column;gap:2px;}
.writing-title{font-size:16.5px;font-weight:500;color:var(--ink);line-height:1.35;}
.writing-subtitle{font-size:14.5px;color:var(--muted);font-style:italic;}
.writing-tag{font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);border:0.5px solid var(--line);padding:1px 7px;border-radius:20px;display:inline-block;margin-top:3px;width:fit-content;}
.writing-arrow{font-family:"DM Mono",monospace;font-size:13px;color:var(--line);transition:color .15s,transform .15s;}
.writing-item:hover .writing-arrow{color:var(--muted);transform:translateX(3px);}
.item-actions{display:none;gap:8px;align-items:center;}
.admin-active .item-actions{display:flex;}
.admin-active .writing-arrow{display:none;}
.action-icon{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:3px;border:0.5px solid var(--line);background:var(--bg);transition:all .12s;}
.action-icon:hover{background:var(--hover);color:var(--ink);}
.action-icon.del:hover{background:#fdf0eb;color:var(--red);border-color:var(--red);}
.edit-bar{display:none;background:var(--ink);color:var(--bg);font-family:"DM Mono",monospace;font-size:11px;padding:8px 48px;justify-content:space-between;align-items:center;}
.edit-bar.show{display:flex;}
.edit-bar button{background:none;border:0.5px solid rgba(255,255,255,.35);color:var(--bg);font-family:"DM Mono",monospace;font-size:11px;padding:4px 14px;border-radius:3px;cursor:pointer;margin-left:8px;}
.edit-bar button:hover{background:rgba(255,255,255,.12);}
footer{padding:24px 48px;display:flex;justify-content:space-between;align-items:center;border-top:0.5px solid var(--line);}
.footer-copy{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);}
.admin-btn{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);background:none;border:0.5px solid var(--line);padding:5px 14px;border-radius:3px;cursor:pointer;transition:all .15s;}
.admin-btn:hover{color:var(--ink);border-color:var(--muted);}
.overlay{display:none;position:fixed;inset:0;background:rgba(17,17,16,.55);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg);border:0.5px solid var(--line);border-radius:6px;padding:36px 40px;width:560px;max-width:95vw;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-label{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
.form-input{width:100%;background:var(--bg);border:0.5px solid var(--line);border-radius:4px;padding:9px 12px;font-family:"DM Mono",monospace;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--muted);}
.link-toggle{display:flex;margin-bottom:12px;border:0.5px solid var(--line);border-radius:4px;overflow:hidden;}
.toggle-opt{flex:1;font-family:"DM Mono",monospace;font-size:11px;padding:7px 0;text-align:center;cursor:pointer;background:var(--bg);color:var(--muted);border:none;transition:all .15s;}
.toggle-opt.active{background:var(--ink);color:var(--bg);}
.upload-area{border:0.5px dashed var(--line);border-radius:4px;padding:16px;text-align:center;cursor:pointer;position:relative;transition:all .15s;}
.upload-area:hover{border-color:var(--muted);background:var(--hover);}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-area-text{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);}
.upload-area-text span{color:var(--ink);text-decoration:underline;}
.file-chosen{font-family:"DM Mono",monospace;font-size:11px;color:var(--ink);margin-top:8px;padding:6px 10px;background:var(--hover);border-radius:3px;}

/* HTML EDITOR */
.editor-wrap{border:0.5px solid var(--line);border-radius:4px;overflow:hidden;margin-top:4px;}
.editor-toolbar{background:var(--hover);padding:6px 10px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:0.5px solid var(--line);align-items:center;}
.editor-toolbar span{font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);margin-right:4px;}
.tb-btn{font-family:"DM Mono",monospace;font-size:11px;padding:3px 8px;border-radius:3px;border:0.5px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;transition:all .12s;}
.tb-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.editor-tabs{display:flex;border-bottom:0.5px solid var(--line);}
.etab{font-family:"DM Mono",monospace;font-size:11px;padding:6px 16px;cursor:pointer;background:var(--hover);color:var(--muted);border:none;border-right:0.5px solid var(--line);transition:all .15s;}
.etab.active{background:var(--bg);color:var(--ink);}
.editor-code{width:100%;min-height:200px;padding:12px;font-family:"DM Mono",monospace;font-size:12px;line-height:1.6;border:none;outline:none;resize:vertical;background:var(--bg);color:var(--ink);}
.editor-preview{min-height:200px;padding:12px;background:#fff;font-family:Georgia,serif;font-size:15px;line-height:1.7;overflow-y:auto;display:none;border-top:0.5px solid var(--line);}
.editor-preview.show{display:block;}

.btn-row{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;flex-wrap:wrap;}
.btn{font-family:"DM Mono",monospace;font-size:12px;padding:9px 20px;border-radius:4px;border:0.5px solid var(--line);cursor:pointer;transition:all .15s;}
.btn-cancel{background:transparent;color:var(--muted);}
.btn-cancel:hover{background:var(--hover);}
.btn-primary{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.btn-primary:hover{opacity:.85;}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
.btn-danger:hover{background:#fdf0eb;}
.pw-error{font-family:"DM Mono",monospace;font-size:11px;color:var(--red);margin-top:6px;display:none;}
.pw-error.show{display:block;}
.article-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow:hidden;flex-direction:column;}
.article-overlay.open{display:flex;}
.article-header{padding:14px 48px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--line);background:var(--bg);flex-shrink:0;}
.article-back{font-family:"DM Mono",monospace;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;}
.article-back:hover{color:var(--ink);}
.article-frame{width:100%;flex:1;border:none;}
@media(max-width:600px){
  nav,.page-header,.writings-container,.month-bar,footer{padding-left:20px;padding-right:20px;}
  .writing-item{grid-template-columns:60px 1fr;}
  .writing-arrow{display:none;}
  .modal{padding:24px 18px;}
}
</style>
</head>
<body>

<div class="edit-bar" id="editBar">
  <span>&#10022; admin mode &mdash; azad singh</span>
  <div>
    <button onclick="openAddModal()">+ add writing</button>
    <button onclick="lockAdmin()">lock</button>
  </div>
</div>

<nav>
  <div class="nav-left">writings / azad</div>
  <div class="nav-right"><a href="#">home</a><a href="#" class="active">writings</a></div>
</nav>

<div class="page-header"><h1>Writings</h1></div>

<div class="month-bar">
  <button class="month-btn active" onclick="filterMonth(this,'all')">ALL</button>
  <button class="month-btn" onclick="filterMonth(this,'JAN')">JAN</button>
  <button class="month-btn" onclick="filterMonth(this,'FEB')">FEB</button>
  <button class="month-btn" onclick="filterMonth(this,'MAR')">MAR</button>
  <button class="month-btn" onclick="filterMonth(this,'APR')">APR</button>
  <button class="month-btn" onclick="filterMonth(this,'MAY')">MAY</button>
  <button class="month-btn" onclick="filterMonth(this,'JUN')">JUN</button>
  <button class="month-btn" onclick="filterMonth(this,'JUL')">JUL</button>
  <button class="month-btn" onclick="filterMonth(this,'AUG')">AUG</button>
  <button class="month-btn" onclick="filterMonth(this,'SEP')">SEP</button>
  <button class="month-btn" onclick="filterMonth(this,'OCT')">OCT</button>
  <button class="month-btn" onclick="filterMonth(this,'NOV')">NOV</button>
  <button class="month-btn" onclick="filterMonth(this,'DEC')">DEC</button>
</div>

<div class="writings-container">
  <ul class="writings-list" id="writingsList"></ul>
</div>

<footer>
  <div class="footer-copy">&copy; AZAD SINGH 2026</div>
  <button class="admin-btn" onclick="openPasswordModal()">admin</button>
</footer>

<!-- PASSWORD -->
<div class="overlay" id="pwOverlay">
  <div class="modal">
    <div class="modal-title">Admin Access</div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="pwInput" placeholder="enter password" onkeydown="if(event.key==='Enter')checkPassword()">
      <div class="pw-error" id="pwError">incorrect password</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeAll()">cancel</button>
      <button class="btn btn-primary" onclick="checkPassword()">unlock</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Writing</div>

    <div style="display:grid;grid-template-columns:1fr 80px 80px;gap:12px">
      <div class="form-group">
        <label class="form-label">Month</label>
        <select class="form-input" id="fMonth">
          <option>JAN</option><option>FEB</option><option>MAR</option><option>APR</option>
          <option>MAY</option><option>JUN</option><option>JUL</option><option>AUG</option>
          <option>SEP</option><option>OCT</option><option>NOV</option><option>DEC</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Day</label>
        <input type="number" class="form-input" id="fDay" placeholder="15" min="1" max="31" style="text-align:center">
      </div>
      <div class="form-group">
        <label class="form-label">Year</label>
        <input type="text" class="form-input" id="fYear" placeholder="26" maxlength="2">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="fTitle" placeholder="e.g. Nykaa, Zomato, Reliance...">
    </div>

    <div class="form-group">
      <label class="form-label">Subtitle (optional)</label>
      <input type="text" class="form-input" id="fSubtitle" placeholder="e.g. India's Beauty Platform Playbook">
    </div>

    <div class="form-group">
      <label class="form-label">Tag / Category (optional)</label>
      <input type="text" class="form-input" id="fTag" placeholder="e.g. Equity Research, Thematic, Macro">
    </div>

    <div class="form-group">
      <label class="form-label">Content Type</label>
      <div class="link-toggle">
        <button class="toggle-opt active" id="optUrl" onclick="switchType('url')">&#128279; URL Link</button>
        <button class="toggle-opt" id="optFile" onclick="switchType('file')">&#128196; HTML File Upload</button>
        <button class="toggle-opt" id="optEditor" onclick="switchType('editor')">&#9998; HTML Editor</button>
      </div>

      <!-- URL -->
      <div id="urlSection">
        <input type="text" class="form-input" id="fLink" placeholder="https://substack.com/...">
      </div>

      <!-- FILE UPLOAD -->
      <div id="fileSection" style="display:none">
        <div class="upload-area">
          <input type="file" accept=".html" id="fFile" onchange="fileSelected(this)">
          <div class="upload-area-text">HTML file drop karo ya <span>click karke select karo</span></div>
        </div>
        <div class="file-chosen" id="fileChosen" style="display:none"></div>
      </div>

      <!-- HTML EDITOR -->
      <div id="editorSection" style="display:none">
        <div class="editor-wrap">
          <div class="editor-toolbar">
            <span>Format:</span>
            <button class="tb-btn" onclick="insertTag('h1')">H1</button>
            <button class="tb-btn" onclick="insertTag('h2')">H2</button>
            <button class="tb-btn" onclick="insertTag('h3')">H3</button>
            <button class="tb-btn" onclick="insertTag('p')">Para</button>
            <button class="tb-btn" onclick="insertTag('b')"><b>B</b></button>
            <button class="tb-btn" onclick="insertTag('i')"><i>I</i></button>
            <button class="tb-btn" onclick="insertTag('ul-li')">List</button>
            <button class="tb-btn" onclick="insertTag('table')">Table</button>
            <button class="tb-btn" onclick="insertTag('hr')">Line</button>
            <button class="tb-btn" onclick="insertTag('a')">Link</button>
          </div>
          <div class="editor-tabs">
            <button class="etab active" id="tabCode" onclick="switchEditorTab('code')">Code</button>
            <button class="etab" id="tabPreview" onclick="switchEditorTab('preview')">Preview</button>
          </div>
          <textarea class="editor-code" id="htmlEditor" placeholder="Yahan HTML likhoo...&#10;&#10;Example:&#10;&lt;h1&gt;Company Name&lt;/h1&gt;&#10;&lt;p&gt;Aapki research yahan...&lt;/p&gt;"></textarea>
          <div class="editor-preview" id="editorPreview"></div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px">
          Tip: Upar buttons se HTML tags insert hote hain. Preview tab mein result dekho.
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeAll()">cancel</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteEditing()" style="display:none">delete</button>
      <button class="btn btn-primary" onclick="saveWriting()">save</button>
    </div>
  </div>
</div>

<!-- ARTICLE VIEWER -->
<div class="article-overlay" id="articleOverlay">
  <div class="article-header">
    <button class="article-back" onclick="closeArticle()">&#8592; back to writings</button>
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)" id="articleTitle"></span>
  </div>
  <iframe class="article-frame" id="articleFrame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

function b64decode(s){
  try{
    const bin=atob(s);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }catch(e){return '<p>Error loading file</p>';}
}
const DEFAULT_WRITINGS=[
  {id:1,month:'APR',year:'26',title:'Time Technoplast',subtitle:'From Plastic Drums to Composite Cylinders',tag:'Equity Research',type:'embedded',embedKey:'tt',link:'#',fileData:null},
  {id:2,month:'APR',year:'26',title:'Scoda Tubes',subtitle:'Speciality Pipes (Power Pipes)',tag:'Equity Research',type:'embedded',embedKey:'sc',link:'#',fileData:null}
];
let writings=[],adminUnlocked=false,editingId=null,currentFilter='all',currentFileData=null,currentLinkType='url';

function save(){try{localStorage.setItem('azad_writings',JSON.stringify(writings));}catch(e){alert('Storage full! Kuch purani writings delete karo.');}}
function load(){const s=localStorage.getItem('azad_writings');writings=s?JSON.parse(s):[...DEFAULT_WRITINGS];}

function render(){
  const list=document.getElementById('writingsList');
  const filtered=currentFilter==='all'?writings:writings.filter(w=>w.month===currentFilter);
  list.innerHTML='';
  if(!filtered.length){list.innerHTML='<li style="padding:24px 8px;font-family:DM Mono,monospace;font-size:12px;color:var(--muted)">Is mahine koi writing nahi.</li>';return;}
  filtered.forEach(w=>{
    const li=document.createElement('li');
    li.className='writing-item'+(adminUnlocked?' admin-active':'');
    li.innerHTML=`
      <span class="writing-date">${w.day?w.day+' ':''}${w.month}.${w.year}</span>
      <span class="writing-content">
        <span class="writing-title">${escHtml(w.title)}</span>
        ${w.subtitle?`<span class="writing-subtitle">${escHtml(w.subtitle)}</span>`:''}
        ${w.tag?`<span class="writing-tag">${escHtml(w.tag)}</span>`:''}
      </span>
      <span class="writing-arrow">&#8594;</span>
      <span class="item-actions">
        <button class="action-icon" onclick="openEditModal(${w.id});event.stopPropagation()">edit</button>
        <button class="action-icon del" onclick="quickDelete(${w.id});event.stopPropagation()">delete</button>
      </span>`;
    li.addEventListener('click',e=>{
      if(e.target.closest('.item-actions')) return;
      let html='';
      if(w.type==='embedded'&&w.embedKey&&EMBEDDED[w.embedKey]) html=b64decode(EMBEDDED[w.embedKey]);
      else if((w.type==='file'||w.type==='editor')&&w.fileData) html=w.fileData;
      else if(w.type==='url'&&w.link&&w.link!=='#'){window.open(w.link,'_blank');return;}
      if(html) openArticle(w,html);
    });
    list.appendChild(li);
  });
}

function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function openArticle(w,html){
  document.getElementById('articleTitle').textContent=w.title;
  const fullHtml=html.trim().startsWith('<!DOCTYPE')||html.trim().startsWith('<html')?html:`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:Georgia,serif;max-width:860px;margin:0 auto;padding:40px 32px;line-height:1.8;font-size:16px;color:#111;}h1,h2,h3{font-family:Arial,sans-serif;}table{width:100%;border-collapse:collapse;margin:20px 0;}td,th{padding:8px 12px;border:1px solid #ddd;text-align:left;}th{background:#f5f5f5;}</style></head><body>${html}</body></html>`;
  document.getElementById('articleFrame').srcdoc=fullHtml;
  document.getElementById('articleOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeArticle(){
  document.getElementById('articleOverlay').classList.remove('open');
  document.getElementById('articleFrame').srcdoc='';
  document.body.style.overflow='';
}

function filterMonth(btn,month){document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=month;render();}

function openPasswordModal(){document.getElementById('pwInput').value='';document.getElementById('pwError').classList.remove('show');document.getElementById('pwOverlay').classList.add('open');setTimeout(()=>document.getElementById('pwInput').focus(),100);}
function checkPassword(){
  if(document.getElementById('pwInput').value===ADMIN_PASSWORD){adminUnlocked=true;closeAll();document.getElementById('editBar').classList.add('show');render();}
  else{document.getElementById('pwError').classList.add('show');document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();}
}
function lockAdmin(){adminUnlocked=false;document.getElementById('editBar').classList.remove('show');render();}

function switchType(type){
  currentLinkType=type;
  ['url','file','editor'].forEach(t=>{
    document.getElementById('opt'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===type);
    document.getElementById(t+'Section').style.display=t===type?'block':'none';
  });
}

function switchEditorTab(tab){
  document.getElementById('tabCode').classList.toggle('active',tab==='code');
  document.getElementById('tabPreview').classList.toggle('active',tab==='preview');
  document.getElementById('htmlEditor').style.display=tab==='code'?'block':'none';
  const prev=document.getElementById('editorPreview');
  if(tab==='preview'){prev.classList.add('show');prev.innerHTML=document.getElementById('htmlEditor').value;}
  else{prev.classList.remove('show');}
}

function insertTag(tag){
  const ta=document.getElementById('htmlEditor');
  const start=ta.selectionStart,end=ta.selectionEnd;
  const sel=ta.value.substring(start,end);
  let insert='';
  if(tag==='h1') insert=`<h1>${sel||'Heading 1'}</h1>\n`;
  else if(tag==='h2') insert=`<h2>${sel||'Heading 2'}</h2>\n`;
  else if(tag==='h3') insert=`<h3>${sel||'Heading 3'}</h3>\n`;
  else if(tag==='p') insert=`<p>${sel||'Paragraph text yahan likhoo...'}</p>\n`;
  else if(tag==='b') insert=`<b>${sel||'bold text'}</b>`;
  else if(tag==='i') insert=`<i>${sel||'italic text'}</i>`;
  else if(tag==='hr') insert=`<hr>\n`;
  else if(tag==='a') insert=`<a href="https://">${sel||'link text'}</a>`;
  else if(tag==='ul-li') insert=`<ul>\n  <li>Item 1</li>\n  <li>Item 2</li>\n  <li>Item 3</li>\n</ul>\n`;
  else if(tag==='table') insert=`<table border="1" style="border-collapse:collapse;width:100%">\n  <tr><th>Column 1</th><th>Column 2</th><th>Column 3</th></tr>\n  <tr><td>Data</td><td>Data</td><td>Data</td></tr>\n</table>\n`;
  ta.value=ta.value.substring(0,start)+insert+ta.value.substring(end);
  ta.focus();ta.selectionStart=ta.selectionEnd=start+insert.length;
}

function fileSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{currentFileData=e.target.result;document.getElementById('fileChosen').style.display='block';document.getElementById('fileChosen').textContent='&#10003; '+file.name;};
  reader.readAsText(file);
}

function openAddModal(){
  editingId=null;currentFileData=null;
  document.getElementById('modalTitle').textContent='Add Writing';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('fMonth').value='APR';
  document.getElementById('fYear').value='26';
  document.getElementById('fDay').value='';
  ['fTitle','fSubtitle','fTag','fLink'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fFile').value='';
  document.getElementById('fileChosen').style.display='none';
  document.getElementById('htmlEditor').value='';
  document.getElementById('editorPreview').innerHTML='';
  switchType('url');
  switchEditorTab('code');
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}

function openEditModal(id){
  const w=writings.find(x=>x.id===id);if(!w)return;
  editingId=id;currentFileData=w.fileData||null;
  document.getElementById('modalTitle').textContent='Edit Writing';
  document.getElementById('deleteBtn').style.display='inline-block';
  document.getElementById('fMonth').value=w.month;
  document.getElementById('fYear').value=w.year;
  document.getElementById('fDay').value=w.day||'';
  document.getElementById('fTitle').value=w.title;
  document.getElementById('fSubtitle').value=w.subtitle||'';
  document.getElementById('fTag').value=w.tag||'';
  document.getElementById('fLink').value=w.link||'';
  document.getElementById('fFile').value='';
  document.getElementById('fileChosen').style.display='none';
  document.getElementById('editorPreview').innerHTML='';

  if(w.type==='editor'){
    document.getElementById('htmlEditor').value=w.fileData||'';
    switchType('editor');switchEditorTab('code');
  } else if(w.type==='file'){
    if(w.fileData){document.getElementById('fileChosen').style.display='block';document.getElementById('fileChosen').textContent='&#10003; file attached';}
    switchType('file');
  } else if(w.type==='embedded'){
    // show embedded content in editor for editing
    const decoded=w.embedKey&&EMBEDDED[w.embedKey]?b64decode(EMBEDDED[w.embedKey]):'';
    document.getElementById('htmlEditor').value=decoded;
    currentFileData=decoded;
    switchType('editor');switchEditorTab('code');
  } else{
    switchType('url');
  }
  document.getElementById('addOverlay').classList.add('open');
}

function saveWriting(){
  const month=document.getElementById('fMonth').value;
  const year=document.getElementById('fYear').value.trim();
  const day=document.getElementById('fDay').value.trim();
  const title=document.getElementById('fTitle').value.trim();
  const sub=document.getElementById('fSubtitle').value.trim();
  const tag=document.getElementById('fTag').value.trim();
  const link=document.getElementById('fLink').value.trim();
  const editorVal=document.getElementById('htmlEditor').value.trim();
  if(!title){alert('Title zaroori hai.');return;}
  if(currentLinkType==='url'&&!link){alert('URL zaroori hai.');return;}
  if(currentLinkType==='file'&&!currentFileData){alert('HTML file select karo.');return;}
  if(currentLinkType==='editor'&&!editorVal){alert('Editor mein kuch likhoo.');return;}
  const fd=currentLinkType==='file'?currentFileData:(currentLinkType==='editor'?editorVal:null);
  const entry={month,day,year,title,subtitle:sub,tag,type:currentLinkType==='editor'?'editor':currentLinkType,embedKey:null,link:currentLinkType==='url'?link:'#',fileData:fd};
  if(editingId!==null){const idx=writings.findIndex(w=>w.id===editingId);if(idx>-1)writings[idx]={id:editingId,...entry};}
  else{const newId=writings.length?Math.max(...writings.map(w=>w.id))+1:1;writings.unshift({id:newId,...entry});}
  save();closeAll();render();
}

function deleteEditing(){if(editingId===null)return;if(!confirm('Delete karna chahte ho?'))return;writings=writings.filter(w=>w.id!==editingId);save();closeAll();render();}
function quickDelete(id){if(!confirm('Delete karna chahte ho?'))return;writings=writings.filter(w=>w.id!==id);save();render();}
function closeAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeAll();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAll();closeArticle();}});
load();render();
</script>
</body>
