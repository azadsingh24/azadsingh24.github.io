n: 2px; }\n  .tag.green { background: var(--c-green-bg); color: var(--c-green); }\n  .tag.red { background: var(--c-red-bg); color: var(--c-red); }\n  .tag.blue { background: var(--c-blue-bg); color: var(--c-accent); }\n  .tag.yellow { background: var(--c-yellow-bg); color: var(--c-gold); }\n\n  /* TOC */\n  .toc { background: var(--c-card); border: 1px solid var(--c-border); border-radius: 8px; padding: 20px 24px; margin-bottom: 40px; }\n  .toc h3 { font-size: 13px; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 1px; color: var(--c-accent); margin-bottom: 12px; margin-top: 0; }\n  .toc ol { padding-left: 20px; font-family: Arial, sans-serif; font-size: 13px; column-count: 2; column-gap: 24px; }\n  @media (max-width: 600px) { .toc ol { column-count: 1; } }\n  .toc li { margin-bottom: 6px; color: var(--c-muted); }\n  .toc a { color: var(--c-accent); text-decoration: none; }\n  .toc a:hover { text-decoration: underline; }\n\n  /* Footer */\n  .footer { border-top: 1px solid var(--c-border); margin-top: 60px; padding-top: 20px; font-family: Arial, sans-serif; font-size: 11px; color: var(--c-light); line-height: 1.6; }\n\n  /* Print */\n  @media print { body { background: white; } .page { padding: 20px; } }\n  ul { padding-left: 20px; margin-bottom: 12px; }\n  li { margin-bottom: 6px; }\n  strong { font-weight: 700; }\n  .small { font-size: 12px; color: var(--c-muted); font-family: Arial, sans-serif; }\n  hr { border: none; border-top: 1px solid var(--c-border); margin: 32px 0; }\n</style>\n</head>\n<body>\n<div class=\"page\">\n\n<!-- HEADER -->\n<div class=\"memo-header\">\n  <div class=\"label\">Institutional Equity Research &bull; Deep Dive &bull; Small Cap</div>\n  <h1>South West Pinnacle Exploration Limited (SWPEL)</h1>\n  <div class=\"sub\">NSE: SOUTHWEST &bull; BSE: 543986 &bull; Sector: Drilling &amp; Exploration Services &bull; Gurugram, Haryana</div>\n  <div class=\"meta-row\">\n    <div class=\"meta-item\"><div class=\"key\">CMP</div><div class=\"val\">₹222 (Apr 8, 2026)</div></div>\n    <div class=\"meta-item\"><div class=\"key\">Market Cap</div><div class=\"val\">~₹663–683 Cr</div></div>\n    <div class=\"meta-item\"><div class=\"key\">52-week Range</div><div class=\"val\">₹95.6 – ₹243</div></div>\n    <div class=\"meta-item\"><div class=\"key\">P/E (TTM)</div><div class=\"val\">~23x</div></div>\n    <div class=\"meta-item\"><div class=\"key\">EV/EBITDA</div><div class=\"val\">~12x</div></div>\n    <div class=\"meta-item\"><div class=\"key\">Promoter Holding</div><div class=\"val\">68.85%</div></div>\n    <div class=\"meta-item\"><div class=\"key\">Order Book</div><div class=\"val\">₹700 Cr</div></div>\n    <div class=\"meta-item\"><div class=\"key\">Memo Date</div><div class=\"val\">April 11, 2026</div></div>\n  </div>\n</div>\n\n<!-- VERDICT BANNER -->\n<div class=\"verdict-banner\">\n  <div class=\"verdict-badge\">ACCUMULATE ON DIPS</div>\n  <div class=\"verdict-text\">\n    <strong>18–24 Month Horizon | Moderate Conviction | High Risk–High Reward Small-Cap</strong>\n    SWPEL is India's largest listed private-sector mineral &amp; coal drilling company, now sitting on its strongest-ever order book of ₹700 Cr (2.9x TTM revenue) after bagging the landmark ₹307 Cr Hind Metal (Hindustan Zinc subsidiary) contract. An 84 MT Jharkhand coal block, two Oman JVs, and India's push to double coal &amp; critical mineral exploration underpin a multi-year structural story. However, a cash conversion cycle of 379 days, near-zero institutional ownership, ASM surveillance status, and unproven coal mining optionality demand strict entry discipline. <strong>Buy zone: ₹160–185. Avoid chasing above ₹235.</strong>\n  </div>\n</div>\n\n<!-- TABLE OF CONTENTS -->\n<div class=\"toc\">\n  <h3>Contents</h3>\n  <ol>\n    <li><a href=\"#s1\">Business Deep Dive</a></li>\n    <li><a href=\"#s2\">Industry &amp; Competitive Positioning</a></li>\n    <li><a href=\"#s3\">Peer Comparison</a></li>\n    <li><a href=\"#s4\">Revenue Concentration Analysis</a></li>\n    <li><a href=\"#s5\">Pipeline &amp; Growth Visibility</a></li>\n    <li><a href=\"#s6\">Business Performance</a></li>\n    <li><a href=\"#s7\">Analyst Q&amp;A Goldmine</a></li>\n    <li><a href=\"#s8\">Management Commentary Analysis</a></li>\n    <li><a href=\"#s9\">Management &amp; Promoter Track Record</a></li>\n    <li><a href=\"#s10\">Capital Allocation &amp; Strategy</a></li>\n    <li><a href=\"#s11\">Financial Quality &amp; Red Flags</a></li>\n    <li><a href=\"#s12\">Shareholding Pattern</a></li>\n    <li><a href=\"#s13\">Guidance &amp; Future Outlook</a></li>\n    <li><a href=\"#s14\">Variant Perception</a></li>\n    <li><a href=\"#s15\">Scenario Building</a></li>\n    <li><a href=\"#s16\">Valuation Analysis</a></li>\n    <li><a href=\"#s17\">Investment Verdict</a></li>\n    <li><a href=\"#s18\">Key Quotes</a></li>\n    <li><a href=\"#s19\">Technical Analysis</a></li>\n  </ol>\n</div>\n\n<!-- ========== SECTION 1 ========== -->\n<div class=\"section\" id=\"s1\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">01</span>\n    <h2>Business Deep Dive</h2>\n  </div>\n\n  <h3>What Does SWPEL Do?</h3>\n  <p>Think of SWPEL as the <strong>\"pick-and-shovel\" play on India's mining boom</strong>. Before any mine can be opened — whether for coal, copper, zinc, bauxite, or groundwater — someone has to drill test holes, study the geology, and map what lies underground. That is exactly what SWPEL does. It is a B2B exploration-services company; it never owns the resource it discovers — <em>it is paid to find it</em>.</p>\n  <p>SWPEL is to mining what a diagnostic lab is to medicine. Mines cannot be built without first proving that the resource exists — and that is the job SWPEL does. Incorporated in 2006 in Gurugram with just 2 drill rigs, the company has scaled to 35+ rigs, 574+ employees, and over 2.6 million metres of cumulative drilling across 140+ projects.</p>\n\n  <div class=\"value-chain\">\n    <div class=\"vc-box\">Rig Manufacturers<br><small style=\"font-weight:400\">(Atlas Copco, Sandvik)</small></div>\n    <div class=\"vc-arrow\">→</div>\n    <div class=\"vc-box highlight\">SWPEL<br><small style=\"font-weight:400\">Drilling &amp; Exploration Services</small></div>\n    <div class=\"vc-arrow\">→</div>\n    <div class=\"vc-box\">Mining Companies<br><small style=\"font-weight:400\">(CIL, Hindalco, Hind Metal)</small></div>\n    <div class=\"vc-arrow\">→</div>\n    <div class=\"vc-box\">Mine Development<br><small style=\"font-weight:400\">&amp; Production</small></div>\n  </div>\n  <p class=\"small\">SWPEL sits between equipment suppliers and mining clients — it never owns the resource. Revenue model: contract-based, B2B, milestone-linked.</p>\n\n  <h3>Business Segments</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Segment</th><th>Nature</th><th>Est. Revenue Share (FY25)</th><th>Growth Stage</th></tr>\n      <tr><td><strong>Drilling &amp; Exploration</strong></td><td>Core — mineral/coal/CBM/aquifer drilling, seismic surveys, geophysical logging</td><td class=\"num\">~85–90%</td><td><span class=\"tag green\">Growth</span></td></tr>\n      <tr><td><strong>Coal Mining &amp; Trading</strong></td><td>Nascent — Jharkhand coal block (84 MT reserve, 266 Ha)</td><td class=\"num\">~5–8%</td><td><span class=\"tag yellow\">Early Stage</span></td></tr>\n      <tr><td><strong>Other (Infra, Consultancy)</strong></td><td>Infrastructure development, geological consultancy</td><td class=\"num\">~5%</td><td><span class=\"tag blue\">Stable</span></td></tr>\n    </table>\n  </div>\n\n  <h3>Key Service Lines — Drilling &amp; Exploration</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Service</th><th>Description</th><th>Margin Profile</th><th>Key Clients</th></tr>\n      <tr><td><strong>Core / Wireline Drilling</strong></td><td>Extracts cylindrical rock samples for geological analysis — the workhorse service</td><td><span class=\"tag yellow\">Mid</span></td><td>Coal India, MECL</td></tr>\n      <tr><td><strong>RC (Reverse Circulation) Drilling</strong></td><td>Faster method for grade estimation in open-pit feasibility studies</td><td><span class=\"tag yellow\">Mid</span></td><td>NALCO, private miners</td></tr>\n      <tr><td><strong>DTH (Down-the-Hole) Drilling</strong></td><td>Hard rock formations; large diameter holes; underground applications</td><td><span class=\"tag yellow\">Mid</span></td><td>Hindustan Copper</td></tr>\n      <tr><td><strong>CBM Exploration &amp; Production Drilling</strong></td><td>Premium, long-duration unconventional energy drilling — highest margins</td><td><span class=\"tag green\">High</span></td><td>ONGC, ESSAR Oil</td></tr>\n      <tr><td><strong>Aquifer Mapping</strong></td><td>Hydrological drilling for govt agencies; NAQUIM initiative</td><td><span class=\"tag green\">High</span></td><td>Central Ground Water Board</td></tr>\n      <tr><td><strong>2D/3D Seismic &amp; Geophysical Services</strong></td><td>Differentiated high-value capability; 15 in-house geoscientists</td><td><span class=\"tag green\">High</span></td><td>Various PSUs</td></tr>\n      <tr><td><strong>Underground Drilling</strong></td><td>Newly added capability (FY25); specialised underground mine drilling</td><td><span class=\"tag yellow\">Mid</span></td><td>Hindustan Copper Ltd</td></tr>\n    </table>\n  </div>\n\n  <h3>Coal Mining Segment — The Long-Dated Option</h3>\n  <p>SWPEL acquired a coal block in Jharkhand (266 hectares, <strong>84 MT geological reserve</strong>) via government forward auction in 2021. It signed a Coal Mine Development and Production Agreement with the Ministry of Coal and became an <strong>accredited prospecting agency</strong> in November 2025. Full mining lease (ML) approval from Jharkhand government is the critical pending step. If commercialised at 1 MT/year at ₹3,000/tonne, this alone could add ₹300 Cr+ annual revenue — but the timeline remains uncertain.</p>\n\n  <h3>Go-to-Market &amp; Critical Dependencies</h3>\n  <p><strong>B2B, contract-based:</strong> Orders won via competitive government tenders (54% of order book) and direct negotiations with private miners (46%). Government clients provide revenue stability; private clients offer better margins and faster contracting cycles.</p>\n  <p><strong>Key clients:</strong> Coal India subsidiaries (SECL, BCCL, WCL), MECL, ONGC, NALCO, Hindalco Industries, Hindustan Zinc / Hind Metal Exploration, Central Ground Water Board.</p>\n  <ul>\n    <li><strong>India's coal production &amp; exploration budget</strong> — directly drives order inflows.</li>\n    <li><strong>Government CAPEX on mineral exploration</strong> — MECL budgets, state GSI spending.</li>\n    <li><strong>Fleet availability</strong> — rig downtime in remote terrain directly impacts margins.</li>\n    <li><strong>Skilled manpower</strong> — geoscientists and drillers in inhospitable locations are scarce.</li>\n    <li><strong>Timely payment from government clients</strong> — the root cause of 151-day debtor days.</li>\n  </ul>\n</div>\n\n<!-- ========== SECTION 2 ========== -->\n<div class=\"section\" id=\"s2\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">02</span>\n    <h2>Industry &amp; Competitive Positioning</h2>\n  </div>\n\n  <h3>Porter's Five Forces Analysis</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Force</th><th>Rating</th><th>Analysis</th></tr>\n      <tr><td><strong>Threat of New Entrants</strong></td><td><span class=\"tag yellow\">Moderate–Low</span></td><td>Capital-intensive (₹1–3 Cr per rig), specialised manpower, ISO certifications required, government tender experience mandatory. A funded industrial group could enter but faces 2–3 year ramp-up.</td></tr>\n      <tr><td><strong>Supplier Power</strong></td><td><span class=\"tag yellow\">Moderate</span></td><td>Rigs sourced globally (Atlas Copco, Sandvik, Boart Longyear) — limited domestic alternatives, creating forex risk. SWPEL's multi-vendor approach mitigates dependence on any single supplier.</td></tr>\n      <tr><td><strong>Buyer Power</strong></td><td><span class=\"tag red\">High</span></td><td>Government agencies dominate via competitive tendering — significant price pressure. Private clients value quality and turnaround, offering slightly better terms. SWPEL is largely a price-taker.</td></tr>\n      <tr><td><strong>Threat of Substitutes</strong></td><td><span class=\"tag green\">Low</span></td><td>No substitute for physical drilling in mineral exploration. Remote sensing and airborne geophysics narrow search areas but cannot replace ground-truthing. This is a structural strength.</td></tr>\n      <tr><td><strong>Competitive Rivalry</strong></td><td><span class=\"tag yellow\">Moderate</span></td><td>Thin private listed peer set. SWPEL competes with smaller regional players. The Hind Metal contract (₹307 Cr) signals SWPEL can now win institutional-scale mandates previously out of reach.</td></tr>\n    </table>\n  </div>\n\n  <h3>Industry Tailwinds</h3>\n  <ul>\n    <li><strong>India's coal production target:</strong> Government aims to push coal to 1.5 Bn tonnes by FY30 (from ~900 MT now). Massive upstream exploration spending needed — SWPEL's direct market.</li>\n    <li><strong>Critical Minerals Mission:</strong> Post-2022 MMDR amendments, India is aggressively pursuing lithium, cobalt, copper, and rare-earth mining. An entirely new greenfield TAM for SWPEL.</li>\n    <li><strong>NAQUIM (National Aquifer Mapping):</strong> A multi-hundred crore government initiative providing structural demand for SWPEL's aquifer mapping services.</li>\n    <li><strong>MECL Recapitalization:</strong> Ministry of Mines infusing capital into MECL to ramp up exploration — directly benefits SWPEL as sub-contractor.</li>\n    <li><strong>CBM / Unconventional Energy:</strong> ~2.6 TCF of India's in-place CBM reserves create long-duration production contracts — SWPEL's highest-margin service.</li>\n  </ul>\n\n  <h3>Competitive Positioning</h3>\n  <p>SWPEL is the <strong>dominant private listed player</strong> in Indian mineral/coal drilling exploration. In the pure-play drilling services space, it has no direct listed competitor of comparable scale — giving it significant investor attention during sector-discovery phases. Its key differentiators are scale (35+ rigs), breadth (core drilling to CBM to seismic), two Oman JVs, and a coal block optionality unavailable to any peer.</p>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Moat Assessment</div>\n    SWPEL's moat is <strong>operational depth + domain lock-in</strong>: 26 million+ metres of cumulative drilling, 15+ in-house geoscientists, ISO 9001/14001/45001 certifications, and relationships with virtually every major Indian mining PSU. New entrants cannot replicate this credibility overnight. However, unlike GPIL's captive mines (a hard physical asset), SWPEL's moat is reputational and human-capital-based — therefore more fragile. Pricing power is limited on government tenders.\n  </div>\n</div>\n\n<!-- ========== SECTION 3 ========== -->\n<div class=\"section\" id=\"s3\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">03</span>\n    <h2>Peer Comparison</h2>\n  </div>\n  <p>There are no perfectly comparable listed peers for SWPEL in India. The table below uses closest available proxies across oilfield services, seismic, and drilling-adjacent companies. Figures are approximate as of early 2026.</p>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr>\n        <th>Company</th><th>MCap (₹Cr)</th><th>Rev TTM (₹Cr)</th><th>Rev 3Y CAGR</th><th>EBITDA Margin</th><th>PAT Margin</th><th>ROE</th><th>P/E (TTM)</th><th>EV/EBITDA</th><th>P/B</th><th>D/E</th><th>Key Note vs SWPEL</th>\n      </tr>\n      <tr class=\"highlight-row\">\n        <td><strong>SWPEL (SOUTHWEST)</strong></td><td class=\"num\">663</td><td class=\"num\">239</td><td class=\"num\">~16%</td><td class=\"num\">~22%</td><td class=\"num\">~12%</td><td class=\"num\">9%</td><td class=\"num\">~23x</td><td class=\"num\">~12x</td><td class=\"num\">3.5x</td><td class=\"num\">0.52x</td><td>Pure-play exploration drilling; coal block optionality</td>\n      </tr>\n      <tr>\n        <td>Alphageo India</td><td class=\"num\">~340</td><td class=\"num\">~90</td><td class=\"num\">~5%</td><td class=\"num\">~18%</td><td class=\"num\">~8%</td><td class=\"num\">8%</td><td class=\"num\">~28x</td><td class=\"num\">~14x</td><td class=\"num\">2.8x</td><td class=\"num\">Nil</td><td>Seismic surveys only; oil &amp; gas focus; different vertical</td>\n      </tr>\n      <tr>\n        <td>Global Offshore Services</td><td class=\"num\">~480</td><td class=\"num\">~430</td><td class=\"num\">~12%</td><td class=\"num\">~28%</td><td class=\"num\">~6%</td><td class=\"num\">6%</td><td class=\"num\">~38x</td><td class=\"num\">~8x</td><td class=\"num\">2.4x</td><td class=\"num\">High</td><td>Offshore vessels; completely different risk/capital profile</td>\n      </tr>\n      <tr>\n        <td>Likhitha Infrastructure</td><td class=\"num\">~900</td><td class=\"num\">~720</td><td class=\"num\">~22%</td><td class=\"num\">~14%</td><td class=\"num\">~9%</td><td class=\"num\">18%</td><td class=\"num\">~25x</td><td class=\"num\">~16x</td><td class=\"num\">4.5x</td><td class=\"num\">0.3x</td><td>Pipeline laying; infra services; better capital efficiency</td>\n      </tr>\n      <tr>\n        <td>United Drilling Tools</td><td class=\"num\">~150</td><td class=\"num\">~70</td><td class=\"num\">~8%</td><td class=\"num\">~32%</td><td class=\"num\">~18%</td><td class=\"num\">14%</td><td class=\"num\">~18x</td><td class=\"num\">~10x</td><td class=\"num\">2.6x</td><td class=\"num\">Nil</td><td>Equipment manufacturer, not services; higher ROE, smaller</td>\n      </tr>\n      <tr>\n        <td>RITES Ltd (reference PSU)</td><td class=\"num\">~3,200</td><td class=\"num\">~1,200</td><td class=\"num\">~11%</td><td class=\"num\">~30%</td><td class=\"num\">~20%</td><td class=\"num\">22%</td><td class=\"num\">~25x</td><td class=\"num\">~18x</td><td class=\"num\">5.5x</td><td class=\"num\">Nil</td><td>PSU consulting/infra; much larger; reference for multiples</td>\n      </tr>\n    </table>\n  </div>\n\n  <div class=\"callout neutral\">\n    <div class=\"callout-head\">Relative Valuation Assessment</div>\n    SWPEL at ~23x P/E trades at a slight premium to Alphageo, justified by superior growth acceleration in FY26. However, SWPEL's ROE/ROCE of 9%/12% is modest — until coal mining contributes and working capital tightens, capital efficiency will drag the multiple. The coal block optionality (84 MT reserve) is valued at near zero by the market — it provides a unique embedded option unavailable to any listed peer. Forward P/E on FY27E earnings (with Hind Metal ramping) could compress to 12–15x, making current levels attractive for patient capital.\n  </div>\n</div>\n\n<!-- ========== SECTION 4 ========== -->\n<div class=\"section\" id=\"s4\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">04</span>\n    <h2>Revenue Concentration Analysis</h2>\n  </div>\n\n  <h3>Service Line Breakdown (Estimated FY25 Revenue Mix)</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Service Line</th><th>Est. Revenue Share</th><th>OPM Profile</th><th>Growth Stage</th><th>Duration</th></tr>\n      <tr><td><strong>Coal &amp; Mineral Drilling</strong></td><td class=\"num\">~50%</td><td><span class=\"tag yellow\">Mid (14–18%)</span></td><td>Mature growth</td><td>Project-based, 3–12 months</td></tr>\n      <tr><td><strong>CBM Production Well Drilling</strong></td><td class=\"num\">~20%</td><td><span class=\"tag green\">High (22–26%)</span></td><td>Growth</td><td>Long-duration (2–5 years)</td></tr>\n      <tr><td><strong>Aquifer Mapping</strong></td><td class=\"num\">~10%</td><td><span class=\"tag green\">High (20–25%)</span></td><td>Growth</td><td>Government contracts, 1–3 years</td></tr>\n      <tr><td><strong>Geophysical / Seismic</strong></td><td class=\"num\">~7%</td><td><span class=\"tag green\">High (25%+)</span></td><td>Early growth</td><td>Project-based</td></tr>\n      <tr><td><strong>Coal Mining &amp; Trading</strong></td><td class=\"num\">~5%</td><td><span class=\"tag blue\">Variable</span></td><td>Early stage</td><td>Multi-year</td></tr>\n      <tr><td><strong>Underground Drilling</strong></td><td class=\"num\">~3%</td><td><span class=\"tag yellow\">Mid</span></td><td>Launch</td><td>New capability</td></tr>\n      <tr><td><strong>Oman JV Contribution</strong></td><td class=\"num\">~5%</td><td><span class=\"tag yellow\">Mid</span></td><td>Established</td><td>11-year contract in JV 1</td></tr>\n    </table>\n  </div>\n\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">Concentration Risk — Coal Dependency</div>\n    Approximately <strong>60–65% of revenues are directly or indirectly coal-related</strong>. This creates a structural ESG and transition risk if India's energy mix shifts faster than expected. However, coal's role in India's power mix is unlikely to diminish significantly before 2040 — making this a 15-year risk, not a 2-year risk. Still, ESG-mandated institutional investors will cite this as a reason to avoid the stock.\n  </div>\n\n  <p><strong>Margin variability:</strong> The wide quarterly OPM range (12% in Q2 FY25 vs 28% in Q3 FY26) reflects service mix shifts. When government core drilling contracts dominate, margins compress. When CBM production wells and seismic contracts are in the mix, margins expand sharply. Sustaining 20%+ OPM requires a consistent blend of premium service contracts.</p>\n</div>\n\n<!-- ========== SECTION 5 ========== -->\n<div class=\"section\" id=\"s5\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">05</span>\n    <h2>Pipeline &amp; Future Growth Visibility</h2>\n  </div>\n\n  <h3>Order Book Evolution — A Transformational Shift</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Period</th><th>Order Book (₹ Cr)</th><th>Commentary</th></tr>\n      <tr><td>FY23</td><td class=\"num\">260.7</td><td>Steady base; predominantly government coal drilling</td></tr>\n      <tr><td>FY24</td><td class=\"num\">215.7</td><td>Dip; delayed government order releases</td></tr>\n      <tr><td>FY25</td><td class=\"num\">328.7</td><td>Recovery; CBM and aquifer wins</td></tr>\n      <tr><td>9M FY26 (pre-Hind Metal)</td><td class=\"num\">444.8</td><td>Highest ever at the time</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Post Hind Metal (Mar 2026)</strong></td><td class=\"num\"><strong>~700</strong></td><td><strong>All-time high; 2.9x TTM revenue — transformational visibility</strong></td></tr>\n    </table>\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Hind Metal Contract — Game Changer</div>\n    At ₹307 Cr over 4 years (~₹75 Cr/year incremental), the Hind Metal Exploration Services (Hindustan Zinc subsidiary) contract is the <strong>largest in SWPEL's history</strong>. It is a 4-year exploration services mandate in Rajasthan. Revenue begins from Q1 FY27 after a 45-day mobilisation post-signing (March 2026). This single contract could add ~30% to annual revenues and will materially improve SWPEL's private-client exposure — a higher-margin portion of the business.\n  </div>\n\n  <h3>Order Book Composition (Post-Hind Metal)</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Order Category</th><th>Approx. Share</th><th>Nature</th></tr>\n      <tr><td>CBM Production Drilling</td><td class=\"num\">~30–35%</td><td>Long-duration, recurring, high-margin</td></tr>\n      <tr><td>Mineral Survey &amp; Exploration</td><td class=\"num\">~25%</td><td>Project-based, lumpy delivery</td></tr>\n      <tr><td>Aquifer Mapping</td><td class=\"num\">~15%</td><td>Government, stable</td></tr>\n      <tr><td>Hind Metal Mega-Contract</td><td class=\"num\">~44%</td><td>4-year, private, premium</td></tr>\n      <tr><td>New Domains (Underground, Geophysical)</td><td class=\"num\">~10%</td><td>Early but growing</td></tr>\n    </table>\n  </div>\n\n  <h3>Jharkhand Coal Block — The Embedded Option</h3>\n  <p>84 MT geological reserve at current e-auction coal prices of ₹2,500–3,500/tonne implies a gross in-situ asset value of <strong>₹21,000–29,400 Cr</strong> — versus SWPEL's entire market cap of ₹660 Cr. Even at conservative mining economics and a 20-year production horizon, the NPV is meaningful. The market is currently valuing this at near zero. Key pending milestone: Mining Lease (ML) approval from Jharkhand government, likely FY27 at earliest.</p>\n\n  <h3>Oman International JVs</h3>\n  <ul>\n    <li><strong>Al Hadeetha Resources LLC (JV 1):</strong> Executing an 11-year mining services contract (USD 125 Mn total value); copper, gold, silver, and chromite exploration. This is operational and generating revenue.</li>\n    <li><strong>Al Hadeetha Mining LLC (JV 2):</strong> Newly formed; allocated Block 22B (1,448 sq km) in Oman for mineral exploration. A long-dated strategic option.</li>\n  </ul>\n</div>\n\n<!-- ========== SECTION 6 ========== -->\n<div class=\"section\" id=\"s6\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">06</span>\n    <h2>Business Performance</h2>\n  </div>\n\n  <h3>Annual Financial Performance</h3>\n  <div class=\"metric-grid\">\n    <div class=\"metric-card\"><div class=\"label\">TTM Revenue</div><div class=\"value\">₹239 Cr</div><div class=\"note\">+60% YoY growth</div></div>\n    <div class=\"metric-card\"><div class=\"label\">TTM EBITDA</div><div class=\"value\">₹54 Cr</div><div class=\"note\">22% margin</div></div>\n    <div class=\"metric-card\"><div class=\"label\">TTM PAT</div><div class=\"value\">₹29 Cr</div><div class=\"note\">+260% growth</div></div>\n    <div class=\"metric-card\"><div class=\"label\">TTM EPS</div><div class=\"value\">₹9.58</div><div class=\"note\">vs ₹4.97 in FY25</div></div>\n  </div>\n\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Metric</th><th>FY22</th><th>FY23</th><th>FY24</th><th>FY25</th><th>TTM (Dec 25)</th></tr>\n      <tr><td>Revenue (₹ Cr)</td><td class=\"num\">118</td><td class=\"num\">124</td><td class=\"num\">133</td><td class=\"num\">179</td><td class=\"num\"><strong>239</strong></td></tr>\n      <tr><td>EBITDA (₹ Cr)</td><td class=\"num\">26</td><td class=\"num\">20</td><td class=\"num\">25</td><td class=\"num\">34</td><td class=\"num\"><strong>54</strong></td></tr>\n      <tr><td>EBITDA Margin</td><td class=\"num\">22%</td><td class=\"num\">16%</td><td class=\"num\">19%</td><td class=\"num\">19%</td><td class=\"num\"><strong>22%</strong></td></tr>\n      <tr><td>PAT (₹ Cr)</td><td class=\"num\">12</td><td class=\"num\">8</td><td class=\"num\">7</td><td class=\"num\">15</td><td class=\"num\"><strong>29</strong></td></tr>\n      <tr><td>PAT Margin</td><td class=\"num\">10%</td><td class=\"num\">6%</td><td class=\"num\">5%</td><td class=\"num\">8%</td><td class=\"num\"><strong>12%</strong></td></tr>\n      <tr><td>EPS (₹)</td><td class=\"num\">4.36</td><td class=\"num\">2.98</td><td class=\"num\">2.54</td><td class=\"num\">4.97</td><td class=\"num\"><strong>9.58</strong></td></tr>\n      <tr><td>ROCE</td><td class=\"num\">14%</td><td class=\"num\">10%</td><td class=\"num\">9%</td><td class=\"num\">12%</td><td class=\"num\"><strong>~14%</strong></td></tr>\n    </table>\n  </div>\n\n  <h3>FY26 Quarterly Trajectory — The Real Story</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Quarter</th><th>Revenue (₹ Cr)</th><th>PAT (₹ Cr)</th><th>OPM %</th><th>YoY Revenue Growth</th></tr>\n      <tr><td>Q1 FY26</td><td class=\"num\">40.1</td><td class=\"num\">2.1</td><td class=\"num\">14%</td><td class=\"num\">+37%</td></tr>\n      <tr><td>Q2 FY26</td><td class=\"num\">62.4</td><td class=\"num\">7.6</td><td class=\"num\">23%</td><td class=\"num\">+128%</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Q3 FY26</strong></td><td class=\"num\"><strong>62.7</strong></td><td class=\"num\"><strong>9.8</strong></td><td class=\"num\"><strong>28%</strong></td><td class=\"num\"><strong>+31%</strong></td></tr>\n      <tr><td><em>9M FY26 Total</em></td><td class=\"num\"><em>~165</em></td><td class=\"num\"><em>~19.5</em></td><td class=\"num\"><em>~22% avg</em></td><td class=\"num\"><em>—</em></td></tr>\n    </table>\n  </div>\n  <p>Q3 FY26 OPM of 28% is the <strong>highest in the company's listed history</strong> — driven by CBM production wells and premium private contracts. Revenue has more than doubled from H1 FY25 to H1 FY26. The business is highly H2-weighted (government project cycles release payments in H2).</p>\n\n  <h3>Working Capital Analysis — The Critical Red Flag</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Metric</th><th>FY22</th><th>FY23</th><th>FY24</th><th>FY25</th></tr>\n      <tr><td>Debtor Days</td><td class=\"num\">203</td><td class=\"num\">161</td><td class=\"num\">154</td><td class=\"num\">151</td></tr>\n      <tr><td>Inventory Days</td><td class=\"num\">—</td><td class=\"num\">576</td><td class=\"num\">389</td><td class=\"num\">376</td></tr>\n      <tr><td>Payable Days</td><td class=\"num\">—</td><td class=\"num\">131</td><td class=\"num\">58</td><td class=\"num\">148</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Cash Conversion Cycle</strong></td><td class=\"num\">203</td><td class=\"num\">606</td><td class=\"num\">485</td><td class=\"num\"><strong>379</strong></td></tr>\n    </table>\n  </div>\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">🔴 Working Capital — Most Critical Risk</div>\n    A Cash Conversion Cycle of <strong>379 days</strong> means SWPEL is essentially financing its government clients for over a year. This is the single most important risk in the business model. It forces reliance on debt (borrowings rose to ₹93 Cr in Sep 2025 from ₹65 Cr in FY25) and structurally constrains free cash flow. Despite improving from 606 days (FY23) to 379 days (FY25), the figure remains egregious. Any revenue surge (as in FY26) temporarily worsens collections before they catch up.\n  </div>\n\n  <h3>CFO vs PAT Quality Check</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Year</th><th>PAT (₹ Cr)</th><th>CFO (₹ Cr)</th><th>CFO/PAT</th><th>Assessment</th></tr>\n      <tr><td>FY23</td><td class=\"num\">8</td><td class=\"num\">3</td><td class=\"num\">0.4x</td><td><span class=\"tag red\">Weak</span></td></tr>\n      <tr><td>FY24</td><td class=\"num\">7</td><td class=\"num\">18</td><td class=\"num\">2.6x</td><td><span class=\"tag green\">Strong</span></td></tr>\n      <tr><td>FY25</td><td class=\"num\">15</td><td class=\"num\">26</td><td class=\"num\">1.7x</td><td><span class=\"tag green\">Healthy</span></td></tr>\n    </table>\n  </div>\n  <p>FY24 and FY25 show reasonable cash conversion — no aggressive revenue recognition signals. Watch FY26 CFO carefully; rapid revenue growth typically inflates working capital temporarily.</p>\n</div>\n\n<!-- ========== SECTION 7 ========== -->\n<div class=\"section\" id=\"s7\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">07</span>\n    <h2>Analyst Q&amp;A Goldmine</h2>\n  </div>\n\n  <h3>Top 5 Recurring Analyst Concerns</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>#</th><th>Analyst Question</th><th>Management Response Pattern</th><th>Our Assessment</th></tr>\n      <tr><td>1</td><td><strong>When does Jharkhand coal block generate meaningful revenue?</strong></td><td>Initially guided \"FY26\"; now shifted to \"FY27\". ML approval pending.</td><td><span class=\"tag red\">Timeline slippage — be skeptical</span></td></tr>\n      <tr><td>2</td><td><strong>Can OPM sustain above 20% given government contract mix?</strong></td><td>Q3 FY26's 28% celebrated; guided for \"improving mix toward premium services.\"</td><td><span class=\"tag yellow\">Achievable if CBM/Hind Metal mix holds</span></td></tr>\n      <tr><td>3</td><td><strong>Explanation for 5.83% promoter stake decline?</strong></td><td>Attributed to QIP/warrant conversion, not open-market selling. No pledging.</td><td><span class=\"tag yellow\">Acceptable but monitor</span></td></tr>\n      <tr><td>4</td><td><strong>What is the Oman JV revenue contribution and profitability?</strong></td><td>Vague — USD 125 Mn total contract cited but annual revenue/margin not disclosed.</td><td><span class=\"tag red\">Transparency gap — flag</span></td></tr>\n      <tr><td>5</td><td><strong>When will debtor days normalise below 120?</strong></td><td>Management acknowledges the issue; no concrete timeline given.</td><td><span class=\"tag red\">Structural problem; no near-term fix</span></td></tr>\n    </table>\n  </div>\n\n  <p><strong>Management's communication style:</strong> Promotional but not deceptive. Confident, aspirational language — but a track record of timeline slippage on coal block and international expansion. The company is small enough that analyst coverage is thin, limiting accountability. Management tends to under-promise on near-term numbers and over-promise on strategic milestones.</p>\n</div>\n\n<!-- ========== SECTION 8 ========== -->\n<div class=\"section\" id=\"s8\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">08</span>\n    <h2>Management Commentary Analysis</h2>\n  </div>\n\n  <h3>Tone Assessment</h3>\n  <p><strong>Confidently bullish, increasingly aspirational.</strong> Post the Hind Metal contract win, management language escalated from \"targeting 15–20% growth\" to \"targeting revenue doubling.\" This is a meaningful shift. The October 2025 investor call headline — \"South West Pinnacle Targets Revenue Doubling With ₹4,122 Million Order Book and Oman Joint Ventures\" — represents the most ambitious public posturing in the company's history.</p>\n\n  <h3>What Management Is NOT Saying</h3>\n  <ul>\n    <li>Specific IRR or return metrics on the Jharkhand coal block investment — how much capital committed, what the payback period is.</li>\n    <li>Quantum of related-party transactions — Pilot Pipelines Pvt Ltd and South West Oil Field Services Pvt Ltd balance sheets disclosed but revenue flows unclear.</li>\n    <li>Exact Oman JV annual revenue contribution and margin — USD 125 Mn total contract cited but no annual breakout.</li>\n    <li>FY26 CFO guidance — given the sharp revenue surge, investors deserve visibility on cash flow quality.</li>\n  </ul>\n\n  <h3>Forward-Looking Statement Credibility Assessment</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Statement</th><th>Credibility</th><th>Rationale</th></tr>\n      <tr><td>\"Revenue doubling\" target (~₹360–380 Cr in FY27)</td><td><span class=\"tag yellow\">Partially Credible</span></td><td>With ₹700 Cr order book, ₹300–340 Cr is achievable. Above ₹340 Cr requires coal block contribution — a stretch.</td></tr>\n      <tr><td>\"Hind Metal revenues from Q1 FY27\"</td><td><span class=\"tag green\">High Credibility</span></td><td>45-day mobilisation after March 2026 signing = May/June 2026 start. Logistics-dependent but feasible.</td></tr>\n      <tr><td>\"Coal block in full swing by FY27\"</td><td><span class=\"tag red\">Low Credibility</span></td><td>ML approval from Jharkhand government has historically taken 12–24 months beyond estimates. Regulatory risk is real.</td></tr>\n      <tr><td>\"Middle East expansion through more Oman contracts\"</td><td><span class=\"tag yellow\">Aspirational</span></td><td>Credible direction; timing and scale unclear.</td></tr>\n    </table>\n  </div>\n\n  <blockquote>\n    \"With robust order book of INR 300 plus Crores, addition of two new contracts of aquifer mapping and underground drilling and commencement of CBM production well project, we are confident of achieving the revenue growth of 15-20% in FY24.\"\n    <cite>— Management FY24 Guidance (Actual outcome: 35% growth in FY25 — guidance proved conservative)</cite>\n  </blockquote>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Would You Give Money to This Management?</div>\n    <strong>Guardedly yes.</strong> The Jain brothers have built a real business from scratch, maintained zero promoter pledging, have no SEBI actions on record, and have delivered consistent (if modest) growth over 17 years. The concern is coal block timeline slippage and opacity around subsidiary operations. They deserve trust — but require monitoring on key milestones quarterly.\n  </div>\n</div>\n\n<!-- ========== SECTION 9 ========== -->\n<div class=\"section\" id=\"s9\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">09</span>\n    <h2>Management &amp; Promoter Track Record</h2>\n  </div>\n\n  <h3>Key Management Personnel</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Name</th><th>Role</th><th>Background &amp; Track Record</th></tr>\n      <tr><td><strong>Vikas Jain</strong></td><td>Founder, Chairman &amp; MD</td><td>Founded SWPEL in 2006 with 2 drill rigs; scaled to 35+ rigs over 17 years. Domain expertise in exploration services. Elder brother of Piyush. Responsible for strategic direction and client relationships.</td></tr>\n      <tr><td><strong>Piyush Jain</strong></td><td>Co-Promoter &amp; Joint MD</td><td>Board member since 2009; 21+ years industry experience. Directly involved in developing, planning, scheduling, and supervising operations. Handles business development and finance.</td></tr>\n      <tr><td><strong>Dinesh Agarwal</strong></td><td>Chief Financial Officer</td><td>In-house CFO; not a prominent external hire. Financial profile not prominently disclosed.</td></tr>\n    </table>\n  </div>\n\n  <h3>Promoter Holding Trend</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Period</th><th>Promoter Holding</th><th>Change</th><th>Commentary</th></tr>\n      <tr><td>Mar 2021</td><td class=\"num\">74.68%</td><td class=\"num\">—</td><td>Post-IPO stable holding</td></tr>\n      <tr><td>Mar 2023</td><td class=\"num\">74.68%</td><td class=\"num\">0.00%</td><td>No change</td></tr>\n      <tr><td>Mar 2024</td><td class=\"num\">73.61%</td><td class=\"num\"><span class=\"tag red\">–1.07%</span></td><td>Minor dilution</td></tr>\n      <tr><td>Mar 2025</td><td class=\"num\">68.85%</td><td class=\"num\"><span class=\"tag red\">–4.76%</span></td><td>QIP/warrant conversion exercise</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Dec 2025</strong></td><td class=\"num\"><strong>68.85%</strong></td><td class=\"num\"><strong>0.00%</strong></td><td><strong>Stable — no further dilution</strong></td></tr>\n    </table>\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">✅ No Promoter Pledging — A Standout Positive</div>\n    Zero promoter pledging is a standout positive for a ₹660 Cr small-cap. This is non-trivial — many companies in this market cap bracket have significant pledging, which creates forced selling risk. SWPEL's clean pledging record reflects financial discipline.\n  </div>\n\n  <ul>\n    <li><strong>Related party transactions:</strong> Pilot Pipelines Pvt Ltd and South West Oil Field Services Pvt Ltd (subsidiaries). Nature appears operational (subcontracting, equipment leasing). No obvious misappropriation signals, but granular disclosure is limited.</li>\n    <li><strong>SEBI/Legal:</strong> No known SEBI actions or major legal proceedings against promoters or management.</li>\n    <li><strong>Auditor:</strong> Doogar &amp; Associates — a smaller firm for this market cap; a governance watch-point but not a disqualifier.</li>\n    <li><strong>Family-run structure:</strong> Vikas Jain (elder brother) and Piyush Jain (younger brother) — classic founder-promoter family business. Professional management depth below CMD level is limited.</li>\n  </ul>\n</div>\n\n<!-- ========== SECTION 10 ========== -->\n<div class=\"section\" id=\"s10\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">10</span>\n    <h2>Capital Allocation &amp; Strategy</h2>\n  </div>\n\n  <h3>CapEx History &amp; Strategy</h3>\n  <p>Fixed assets grew from ₹56 Cr (FY22) to ₹110 Cr (Sep 2025) — a near doubling in 3 years. The company has added 4 new underground drilling rigs (Hindustan Copper contract), mobilised rigs for Hind Metal, and invested in coal block development. This is appropriate capex for a services business growing at 15–35% annually.</p>\n\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Capital Allocation Decision</th><th>Year</th><th>Assessment</th></tr>\n      <tr><td>Fleet expansion (underground drilling rigs)</td><td>FY24–25</td><td><span class=\"tag green\">Good — demand-driven, contract-backed</span></td></tr>\n      <tr><td>Jharkhand coal block acquisition</td><td>2021</td><td><span class=\"tag yellow\">Bold — unproven but strategically sound</span></td></tr>\n      <tr><td>Oman JV formation (2 JVs)</td><td>2019–23</td><td><span class=\"tag yellow\">Promising — USD 125 Mn contract in JV 1</span></td></tr>\n      <tr><td>QIP/Warrant issuance (₹34.8 Cr raised)</td><td>FY25</td><td><span class=\"tag green\">Good — promoters subscribed ₹7.5 Cr; signals confidence</span></td></tr>\n      <tr><td>Zero dividend in FY25</td><td>FY25</td><td><span class=\"tag green\">Appropriate — growth reinvestment phase</span></td></tr>\n    </table>\n  </div>\n\n  <p><strong>Capital allocation discipline: B+</strong> — disciplined, no empire-building, debt manageable at 0.52x D/E. The coal block is the one unproven capital allocation decision requiring ongoing monitoring. The QIP is positive signal — promoters participating in their own capital raise.</p>\n</div>\n\n<!-- ========== SECTION 11 ========== -->\n<div class=\"section\" id=\"s11\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">11</span>\n    <h2>Financial Quality &amp; Red Flags</h2>\n  </div>\n\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">🔴 Red Flag 1 — Working Capital (Critical)</div>\n    Cash Conversion Cycle of 379 days is egregious. Government clients routinely delay payments by 6–18 months. This risk is <strong>structural and will not disappear</strong>. Any revenue surge worsens collections temporarily. Borrowings rose to ₹93 Cr (Sep 2025) from ₹65 Cr (FY25) — debt is rising to fund working capital, not capex.\n  </div>\n\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">🟡 Red Flag 2 — Promoter Stake Decline</div>\n    5.83% reduction over 3 years is explained by warrant dilution, not open-market selling. However, future equity dilution for coal block development (which will require significant capital) remains a risk to existing shareholders.\n  </div>\n\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">🟡 Red Flag 3 — Subsidiary Transparency</div>\n    Pilot Pipelines Pvt Ltd and South West Oil Field Services Pvt Ltd financial flows deserve more granular disclosure. Revenue contributions, margins, and RPT quantum are not clearly broken out in public filings.\n  </div>\n\n  <div class=\"callout warning\">\n    <div class=\"callout-head\">🟡 Red Flag 4 — Revenue Lumpiness</div>\n    Project-based business with milestone-linked revenue recognition. A single large project delay can cause a severe quarterly revenue miss — as happened in Q1 FY25 (₹27 Cr vs Q4 FY24's ₹45 Cr, a 40% sequential drop).\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">✅ Positive 1 — No Pledging, Clean Legal Record</div>\n    Zero promoter pledging and no SEBI actions. In this market cap bracket, this is a meaningful governance differentiator.\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">✅ Positive 2 — CFO Tracks PAT</div>\n    Cash profit broadly matched reported profit in FY24 and FY25. No aggressive revenue recognition signals. Tax rate in line with statutory norms.\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">✅ Positive 3 — Manageable Debt</div>\n    D/E of 0.52x (Sep 2025). Interest coverage ~5–6x in H1 FY26. No imminent balance sheet risk despite elevated working capital.\n  </div>\n</div>\n\n<!-- ========== SECTION 12 ========== -->\n<div class=\"section\" id=\"s12\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">12</span>\n    <h2>Shareholding Pattern &amp; Institutional Activity</h2>\n  </div>\n\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Category</th><th>Dec 2023</th><th>Mar 2024</th><th>Mar 2025</th><th>Sep 2025</th><th>Dec 2025</th></tr>\n      <tr><td><strong>Promoters</strong></td><td class=\"num\">74.68%</td><td class=\"num\">73.61%</td><td class=\"num\">68.85%</td><td class=\"num\">68.85%</td><td class=\"num\"><strong>68.85%</strong></td></tr>\n      <tr><td>FIIs</td><td class=\"num\">0.08%</td><td class=\"num\">0.01%</td><td class=\"num\">0.01%</td><td class=\"num\">0.08%</td><td class=\"num\">0.28%</td></tr>\n      <tr><td>DIIs / Mutual Funds</td><td class=\"num\">0.00%</td><td class=\"num\">0.00%</td><td class=\"num\">0.00%</td><td class=\"num\">0.00%</td><td class=\"num\"><strong>0.00%</strong></td></tr>\n      <tr><td>Public / Retail</td><td class=\"num\">25.24%</td><td class=\"num\">26.38%</td><td class=\"num\">31.13%</td><td class=\"num\">31.07%</td><td class=\"num\">30.87%</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Total Shareholders</strong></td><td class=\"num\">5,289</td><td class=\"num\">8,195</td><td class=\"num\">10,023</td><td class=\"num\">9,426</td><td class=\"num\"><strong>11,279</strong></td></tr>\n    </table>\n  </div>\n\n  <div class=\"callout neutral\">\n    <div class=\"callout-head\">Zero Institutional Ownership — Risk AND Opportunity</div>\n    <strong>Risk:</strong> No mutual fund or FII ownership means no price support during selling, high volatility, no analyst coverage, and limited liquidity. The stock is retail/HNI-dominated and prone to sentiment swings.<br><br>\n    <strong>Opportunity:</strong> The stock is genuinely undiscovered by institutions. The first mutual fund entry or research initiation could be a significant re-rating trigger — similar to what happened with other small-cap services companies when they hit institutional radar. Shareholder count growing from 2,951 (Mar 2023) to 11,279 (Dec 2025) shows retail interest building.<br><br>\n    <strong>ASM Status Alert:</strong> The stock is under SEBI's Additional Surveillance Mechanism (ASM). Investors must check current ASM status before investing — ASM restricts circuit filters, reduces liquidity, and prevents institutional participation.\n  </div>\n</div>\n\n<!-- ========== SECTION 13 ========== -->\n<div class=\"section\" id=\"s13\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">13</span>\n    <h2>Guidance &amp; Future Outlook</h2>\n  </div>\n\n  <h3>Management Guidance (As of March 2026)</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Guidance Item</th><th>Management Statement</th><th>Our Estimate</th><th>Credibility</th></tr>\n      <tr><td>FY27 Revenue Target</td><td>\"Revenue doubling\" (~₹360–380 Cr)</td><td>₹300–340 Cr</td><td><span class=\"tag yellow\">Partially Credible</span></td></tr>\n      <tr><td>Hind Metal Revenue Start</td><td>\"Q1 FY27 itself, after 45-day mobilisation\"</td><td>Q1/Q2 FY27</td><td><span class=\"tag green\">High</span></td></tr>\n      <tr><td>Coal Block Contribution</td><td>\"Mining lease and commercial operations FY27\"</td><td>FY28 at earliest</td><td><span class=\"tag red\">Low</span></td></tr>\n      <tr><td>Order Book Growth</td><td>\"Largest ever at ₹700 Cr; more to come\"</td><td>₹750–800 Cr by Q2 FY27</td><td><span class=\"tag green\">Credible</span></td></tr>\n    </table>\n  </div>\n\n  <h3>Risks to Guidance</h3>\n  <ul>\n    <li>Mining lease approval in Jharkhand faces regulatory risk — typically 12–24 months beyond management estimates.</li>\n    <li>Hind Metal mobilisation (Rajasthan terrain logistics) could delay by 1–2 quarters.</li>\n    <li>H1 FY27 may look weak given the structural H2-weighted revenue pattern.</li>\n    <li>Government coal exploration budget cuts — unlikely but not impossible given fiscal pressures.</li>\n    <li>Working capital deterioration if PSU payment cycles worsen.</li>\n  </ul>\n</div>\n\n<!-- ========== SECTION 14 ========== -->\n<div class=\"section\" id=\"s14\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">14</span>\n    <h2>Variant Perception</h2>\n  </div>\n\n  <h3>What the Market May Be Underestimating</h3>\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Upside Variant 1 — Hind Metal is Transformational, Not Incremental</div>\n    At ₹307 Cr over 4 years (₹75+ Cr annually), this single contract could add ~30% to annual revenues from FY27. The market reacted positively post-announcement but may not have fully priced the <strong>4-year revenue visibility and relationship depth</strong> it creates with Hindustan Zinc — India's largest zinc miner with massive ongoing exploration needs.\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Upside Variant 2 — The Coal Block Is a Real Option Valued at Zero</div>\n    84 MT at current e-auction coal prices of ₹2,500–3,500/tonne implies a gross in-situ asset value of ₹21,000–29,400 Cr. SWPEL's market cap is ₹660 Cr. Even at a 99% haircut for risk and uncertainty, the option value is positive. The market is pricing this at zero.\n  </div>\n\n  <div class=\"callout positive\">\n    <div class=\"callout-head\">Upside Variant 3 — Institutional Discovery</div>\n    Zero MF/FII ownership means the first institutional entry could be a disproportionate re-rating event. As revenues cross ₹300–400 Cr and the company achieves multi-quarter earnings consistency, small/mid-cap fund inclusion becomes more likely.\n  </div>\n\n  <h3>What the Market May Be Ignoring (Downside Risks)</h3>\n  <ul>\n    <li><strong>Working capital deterioration:</strong> Sharp FY26 revenue growth will inflate receivables — FY26 CFO may disappoint despite strong PAT.</li>\n    <li><strong>Coal transition risk:</strong> A 10–15 year risk, not 2-year — but ESG mandates may prevent institutional entry regardless of financial quality.</li>\n    <li><strong>ASM surveillance status:</strong> Suppresses multiples and prevents institutional participation until resolved.</li>\n    <li><strong>Execution overload:</strong> Managing coal block + Oman Block 22B + Hind Metal ramp + underground drilling simultaneously is a real risk for a ₹182 Cr net-worth company.</li>\n  </ul>\n</div>\n\n<!-- ========== SECTION 15 ========== -->\n<div class=\"section\" id=\"s15\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">15</span>\n    <h2>Scenario Building</h2>\n  </div>\n\n  <div class=\"scenarios\">\n    <div class=\"scenario-card bull\">\n      <h4>🐂 Bull Case — 25% Probability</h4>\n      <div class=\"price\">₹470</div>\n      <p style=\"font-size:11px;font-family:Arial,sans-serif;color:#555;margin-bottom:10px\">18-month target | +112% upside</p>\n      <div class=\"kv\"><span>FY27 Revenue</span><span>₹340 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EBITDA</span><span>₹85 Cr</span></div>\n      <div class=\"kv\"><span>FY27 PAT</span><span>₹50 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EPS</span><span>₹16.8</span></div>\n      <div class=\"kv\"><span>P/E Applied</span><span>28x</span></div>\n      <ul style=\"margin-top:10px\">\n        <li>Hind Metal ramps to ₹80 Cr/year from Q2 FY27</li>\n        <li>Coal block ML granted; mining commences FY28</li>\n        <li>Critical minerals contracts (lithium/copper) added</li>\n        <li>OPMs sustain 22–25%; institutional entry triggers re-rating</li>\n      </ul>\n    </div>\n\n    <div class=\"scenario-card base\">\n      <h4>📊 Base Case — 55% Probability</h4>\n      <div class=\"price\">₹282</div>\n      <p style=\"font-size:11px;font-family:Arial,sans-serif;color:#555;margin-bottom:10px\">18-month target | +27% upside</p>\n      <div class=\"kv\"><span>FY27 Revenue</span><span>₹300 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EBITDA</span><span>₹66 Cr</span></div>\n      <div class=\"kv\"><span>FY27 PAT</span><span>₹38 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EPS</span><span>₹12.8</span></div>\n      <div class=\"kv\"><span>P/E Applied</span><span>22x</span></div>\n      <ul style=\"margin-top:10px\">\n        <li>Hind Metal contributes ₹60–65 Cr from FY27</li>\n        <li>Coal block begins limited operations FY28</li>\n        <li>Revenue grows 30–35% in FY27, then 20% in FY28</li>\n        <li>OPMs at 19–22%; working capital stays elevated</li>\n      </ul>\n    </div>\n\n    <div class=\"scenario-card bear\">\n      <h4>🐻 Bear Case — 20% Probability</h4>\n      <div class=\"price\">₹118</div>\n      <p style=\"font-size:11px;font-family:Arial,sans-serif;color:#555;margin-bottom:10px\">18-month downside | –47%</p>\n      <div class=\"kv\"><span>FY27 Revenue</span><span>₹245 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EBITDA</span><span>₹44 Cr</span></div>\n      <div class=\"kv\"><span>FY27 PAT</span><span>₹25 Cr</span></div>\n      <div class=\"kv\"><span>FY27 EPS</span><span>₹8.4</span></div>\n      <div class=\"kv\"><span>P/E Applied</span><span>14x</span></div>\n      <ul style=\"margin-top:10px\">\n        <li>Hind Metal mobilisation delayed to Q3 FY27</li>\n        <li>Coal block ML pushed to FY29</li>\n        <li>Government order inflows slow; WC deteriorates</li>\n        <li>OPMs compress to 16–18%; credit risk spikes</li>\n      </ul>\n    </div>\n  </div>\n\n  <div class=\"callout neutral\">\n    <div class=\"callout-head\">Risk-Reward Assessment at ₹222 CMP</div>\n    Base case upside ₹60 (to ₹282) vs bear case downside ₹104 (to ₹118) = <strong>0.6:1 risk-reward at ₹222 — not compelling.</strong> Risk-reward improves significantly below ₹180, where bear case downside is only ₹62 vs base case upside of ₹102 — a more attractive 1.6:1+. Accumulate in the ₹160–185 buy zone.\n  </div>\n</div>\n\n<!-- ========== SECTION 16 ========== -->\n<div class=\"section\" id=\"s16\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">16</span>\n    <h2>Valuation Analysis</h2>\n  </div>\n\n  <h3>Current Valuation Multiples (CMP ~₹222, April 8, 2026)</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Multiple</th><th>Current Level</th><th>Assessment</th><th>Implication</th></tr>\n      <tr><td>P/E (TTM)</td><td class=\"num\">~23x</td><td><span class=\"tag yellow\">Fair</span></td><td>Reasonable for a 12% PAT margin business, but stretched for 9% ROE</td></tr>\n      <tr><td>P/E (FY26E)</td><td class=\"num\">~22x</td><td><span class=\"tag yellow\">Fair</span></td><td>Priced for near-perfect FY26 execution</td></tr>\n      <tr><td>P/E (FY27E base)</td><td class=\"num\">~17x</td><td><span class=\"tag green\">Attractive</span></td><td>Compelling if base case materialises</td></tr>\n      <tr><td>EV/EBITDA (TTM)</td><td class=\"num\">~12x</td><td><span class=\"tag yellow\">Fair</span></td><td>In line with infra/services peers</td></tr>\n      <tr><td>P/B</td><td class=\"num\">3.5x</td><td><span class=\"tag red\">Stretched</span></td><td>Premium to book on 9% ROE is historically elevated</td></tr>\n      <tr><td>P/S (TTM)</td><td class=\"num\">~2.8x</td><td><span class=\"tag green\">Acceptable</span></td><td>Reasonable for a services business with 22% EBITDA margin</td></tr>\n    </table>\n  </div>\n\n  <h3>DCF Indicative Valuation (Base Case)</h3>\n  <p><em>Assumptions: FY27 PAT ₹38 Cr, 18% CAGR next 5 years, terminal growth 5%, WACC 14%</em></p>\n  <div class=\"callout neutral\">\n    <div class=\"callout-head\">DCF Fair Value Range: ₹200–240</div>\n    At CMP ₹222, the stock is trading at the <strong>upper end of DCF fair value</strong>. There is limited margin of safety at current levels. The DCF does NOT include coal block optionality — which could add ₹40–80/share in a scenario where the ML is granted and mining commences.\n  </div>\n\n  <h3>Historical &amp; Technical Context</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Metric</th><th>Value</th></tr>\n      <tr><td>52-week High</td><td class=\"num\">₹243</td></tr>\n      <tr><td>52-week Low</td><td class=\"num\">₹95.6</td></tr>\n      <tr><td>Current vs 52-week Low</td><td class=\"num\">+133%</td></tr>\n      <tr><td>All-time High</td><td class=\"num\">₹249 (Feb 2022)</td></tr>\n      <tr><td>What's Priced In</td><td>Hind Metal ramp, 20%+ OPMs, no coal block risk</td></tr>\n      <tr><td>Not Priced In (Options)</td><td>Coal mining contribution, Oman Block 22B, institutional discovery</td></tr>\n    </table>\n  </div>\n</div>\n\n<!-- ========== SECTION 17 ========== -->\n<div class=\"section\" id=\"s17\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">17</span>\n    <h2>Investment Verdict</h2>\n  </div>\n\n  <div class=\"verdict-banner\">\n    <div class=\"verdict-badge\">ACCUMULATE ON DIPS</div>\n    <div class=\"verdict-text\">\n      <strong>Buy Zone: ₹160–185 | Base Target: ₹282 (18m) | Bull Target: ₹420+ (24m)</strong>\n      Conviction: MODERATE (3/5) | Position Size: 1–3% of portfolio | Time Horizon: 18–24 months\n    </div>\n  </div>\n\n  <h3>Why ACCUMULATE and Not BUY Aggressively at ₹222</h3>\n  <ul>\n    <li>Stock has run 133% from its 52-week low — near-term momentum is partially exhausted.</li>\n    <li>P/B of 3.5x on a 9% ROE is historically stretched — asymmetric to the downside.</li>\n    <li>ASM surveillance status limits institutional participation and suppresses the multiple.</li>\n    <li>Working capital risk could suppress FY26 CFO quality despite strong PAT numbers.</li>\n  </ul>\n\n  <h3>Why Not AVOID</h3>\n  <ul>\n    <li>₹700 Cr order book is the highest in company history — revenue visibility is real and unprecedented.</li>\n    <li>Hind Metal is the largest contract ever — a game-changing mandate from a marquee client.</li>\n    <li>Jharkhand coal block + Oman Block 22B = real embedded options with near-zero market valuation.</li>\n    <li>Undiscovered by institutions — first MF/FII entry could be a major re-rating catalyst.</li>\n    <li>India's coal and critical mineral exploration spending is structurally growing for the next decade.</li>\n  </ul>\n\n  <h3>Key Triggers to Track (Next 4 Quarters)</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Trigger</th><th>Timeline</th><th>Impact</th></tr>\n      <tr><td>Q4 FY26 results — confirm ₹225+ Cr revenue and ₹28–30 Cr PAT</td><td>May 2026</td><td><span class=\"tag yellow\">Medium</span></td></tr>\n      <tr><td>Hind Metal mobilisation confirmation — revenue begins flowing</td><td>Apr–Jun 2026</td><td><span class=\"tag green\">High Positive</span></td></tr>\n      <tr><td>Jharkhand Mining Lease (ML) approval</td><td>FY27 (uncertain)</td><td><span class=\"tag green\">Very High Positive</span></td></tr>\n      <tr><td>Critical minerals contract additions (lithium, nickel, copper)</td><td>FY27</td><td><span class=\"tag green\">High Positive</span></td></tr>\n      <tr><td>Promoter holding (Mar 2026 pattern) — stability or further dilution?</td><td>May 2026</td><td><span class=\"tag yellow\">Watch</span></td></tr>\n      <tr><td>ASM status resolution on NSE/BSE</td><td>Ongoing</td><td><span class=\"tag green\">High — enables institutional entry</span></td></tr>\n      <tr><td>FY26 annual CFO — does working capital worsen with revenue surge?</td><td>May 2026</td><td><span class=\"tag red\">Key Risk Monitor</span></td></tr>\n    </table>\n  </div>\n\n  <h3>Position Sizing Recommendation</h3>\n  <div class=\"callout neutral\">\n    <div class=\"callout-head\">High-Risk Tracking Position — Not a Core Holding</div>\n    Given small-cap risk (₹660 Cr), ASM surveillance, illiquid float, and unproven coal block:\n    <ul style=\"margin-top:8px\">\n      <li><strong>Current price (₹222):</strong> 1–2% of portfolio maximum. Risk-reward doesn't justify more.</li>\n      <li><strong>Buy zone (₹160–185):</strong> Build to 2–3% of portfolio. This is the ideal accumulation range.</li>\n      <li><strong>Scale to 4–5% ONLY IF:</strong> ML granted + ASM resolved + institutional coverage initiated.</li>\n      <li><strong>Exit triggers:</strong> 3-day close below ₹174 (200 DMA), or promoter pledging commences.</li>\n    </ul>\n  </div>\n</div>\n\n<!-- ========== SECTION 18 ========== -->\n<div class=\"section\" id=\"s18\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">18</span>\n    <h2>Key Quotes</h2>\n  </div>\n\n  <h3>Management — Bullish</h3>\n\n  <blockquote>\n    \"With robust order book of INR 300 plus Crores, addition of two new contracts of aquifer mapping and underground drilling and commencement of CBM production well project, we are confident of achieving the revenue growth of 15-20% in FY24.\"\n    <cite>— Management, FY24 Guidance [Actual outcome: 35% growth in FY25 — guidance proved consistently conservative]</cite>\n  </blockquote>\n\n  <blockquote>\n    \"Execution of a long-term contract of USD 125 million through our JV in Oman is progressing well, which is making us more confident for bagging and executing many more such contracts in the Middle East region in the times ahead.\"\n    <cite>— Vikas Jain, CMD — Director's Report FY25</cite>\n  </blockquote>\n\n  <blockquote>\n    \"South West Pinnacle Targets Revenue Doubling With ₹4,122 Million Order Book and Oman Joint Ventures.\"\n    <cite>— Press Release Headline, October 29, 2025 (Q2 FY26 Earnings)</cite>\n  </blockquote>\n\n  <blockquote>\n    \"Revenue generation from this contract will commence from the first quarter of FY 2026–27 itself after completion of mobilisation of Rigs and other resources in next 45 days.\"\n    <cite>— Management on Hind Metal ₹307 Cr contract, March 2026</cite>\n  </blockquote>\n\n  <blockquote>\n    \"Dependence on coal is likely to remain high since renewable sources are not viable to fulfil the scale of demand. We aim to utilize our assets and know-how in this project [Jharkhand coal block], the revenue generation is expected to commence by FY26.\"\n    <cite>— Management, Q2 FY24 Earnings [Note: timeline subsequently pushed to FY27]</cite>\n  </blockquote>\n\n  <h3>Market / Third-Party — Cautionary</h3>\n\n  <blockquote>\n    \"Company has high debtors of 151 days.\"\n    <cite>— Screener.in automated alert (structural red flag)</cite>\n  </blockquote>\n\n  <blockquote>\n    \"Company has a low return on equity of 7.49% over last 3 years.\"\n    <cite>— Screener.in automated alert (capital efficiency concern)</cite>\n  </blockquote>\n\n  <blockquote>\n    \"Promoter holding has decreased over last 3 years: –5.83%.\"\n    <cite>— Screener.in automated alert (dilution watch-point)</cite>\n  </blockquote>\n</div>\n\n<!-- ========== SECTION 19 ========== -->\n<div class=\"section\" id=\"s19\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">19</span>\n    <h2>Technical Analysis Overview</h2>\n  </div>\n\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Technical Indicator</th><th>Level / Status</th><th>Interpretation</th></tr>\n      <tr><td><strong>Current Price (Apr '26)</strong></td><td>~₹222</td><td>~9% below 52-week high of ₹243; building a high base</td></tr>\n      <tr><td><strong>Primary Trend (Weekly)</strong></td><td><span class=\"tag green\">Bullish</span></td><td>Series of higher highs and higher lows from ₹95 low (Mar 2025). V-shaped recovery in Apr 2026 (₹175→₹229).</td></tr>\n      <tr><td><strong>Secondary Trend (Daily)</strong></td><td><span class=\"tag yellow\">Recovering / Sideways-Bullish</span></td><td>Broke out of ₹170–185 consolidation on Hind Metal news; testing 52-week high zone.</td></tr>\n      <tr><td><strong>50 DMA</strong></td><td>~₹199</td><td>Price ~11% ABOVE — bullish; 50 DMA acting as support</td></tr>\n      <tr><td><strong>100 DMA</strong></td><td>~₹185</td><td>Price ~20% ABOVE — healthy bull trend intact</td></tr>\n      <tr><td><strong>200 DMA</strong></td><td>~₹174</td><td>Price ~27% ABOVE — structural uptrend confirmed; 200 DMA = key support</td></tr>\n      <tr><td><strong>MA Signal</strong></td><td><span class=\"tag green\">Golden Cross in Effect</span></td><td>50 DMA &gt; 100 DMA &gt; 200 DMA — textbook bull alignment since early 2025</td></tr>\n      <tr><td><strong>RSI (14-day)</strong></td><td>~65–72</td><td>Neutral-to-overbought. Above ₹75 = short-term caution. Recent sharp move may push RSI toward overbought.</td></tr>\n      <tr><td><strong>Volume</strong></td><td>Thin (~₹3–8 Cr/day)</td><td>Breakout on Hind Metal news was volume-validated. Low average volumes = susceptibility to sharp moves on news.</td></tr>\n      <tr><td><strong>EPS Rank / RS Rating</strong></td><td>90 / 95</td><td>GREAT scores per O'Neil methodology — top decile earnings consistency and price outperformance</td></tr>\n    </table>\n  </div>\n\n  <h3>Key Support &amp; Resistance Levels</h3>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Level</th><th>Type</th><th>Rationale</th></tr>\n      <tr><td><strong>₹240–243</strong></td><td>Resistance 1</td><td>52-week high + all-time high cluster; major supply zone</td></tr>\n      <tr><td><strong>₹265–270</strong></td><td>Resistance 2</td><td>Fibonacci 161.8% extension from ₹95 low; next leg target post breakout</td></tr>\n      <tr><td><strong>₹300</strong></td><td>Resistance 3</td><td>Psychological round number; bull-case first stop</td></tr>\n      <tr><td><strong>₹199–202</strong></td><td>Support 1</td><td>50 DMA + prior consolidation base + high-volume demand zone</td></tr>\n      <tr><td><strong>₹174–180</strong></td><td>Support 2</td><td>200 DMA + recent swing low; strong structural floor</td></tr>\n      <tr><td><strong>₹155–160</strong></td><td>Support 3</td><td>Prior swing high (Nov 2025); now major demand zone</td></tr>\n    </table>\n  </div>\n\n  <h3>Chart Pattern</h3>\n  <p>The stock appears to be <strong>forming a high base</strong> in the ₹175–243 range after a major 133% run-up from March 2025 lows. A sustained breakout above ₹243 (52-week high) on volume would be technically significant, targeting ₹265–280 in the near term. The weekly chart resembles an <strong>ascending triangle</strong> (flat resistance at ₹240–243, rising lows as trendline) — a classically bullish pattern. A decisive close above ₹243 on above-average volume is the key confirmation.</p>\n\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Technical Setup</th><th>Price Level</th><th>Stop Loss</th><th>Target 1</th><th>Target 2</th><th>Risk:Reward</th></tr>\n      <tr><td><strong>Wait for Dip — BUY</strong></td><td>₹185–200</td><td>₹174 (close below)</td><td>₹240–243</td><td>₹265–270</td><td>~1:2.5 to T1; 1:3 to T2</td></tr>\n      <tr><td><strong>Breakout BUY</strong></td><td>₹243+ (breakout)</td><td>₹224</td><td>₹265–270</td><td>₹300</td><td>~1:1.7 to T1; 1:3 to T2</td></tr>\n      <tr><td><strong>Current Zone — HOLD</strong></td><td>₹215–235</td><td>₹199</td><td>₹243</td><td>₹265</td><td>~0.9:1 — Neutral</td></tr>\n      <tr><td><strong>EXIT Signal</strong></td><td>&lt; ₹174 (3-day close)</td><td>—</td><td>—</td><td>—</td><td>Trend broken; exit</td></tr>\n    </table>\n  </div>\n\n  <p>From a purely technical perspective, the stock is in an <strong>uptrend above all key MAs, with RSI in healthy territory</strong> and the most powerful order book catalyst in its history. However, risk-reward at ₹222 is neutral at best. Patient investors should wait for pullbacks to the ₹185–200 zone for optimal entry.</p>\n</div>\n\n<hr>\n\n<!-- FINAL SCORECARD -->\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"section-num\">★</span>\n    <h2>One-Page Synthesis — Investment Scorecard</h2>\n  </div>\n  <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>Dimension</th><th>Assessment</th><th>Score (1–5)</th></tr>\n      <tr><td>Business Quality</td><td>Good — India's dominant private drilling services player; diversified services; no listed peer</td><td>3.5/5</td></tr>\n      <tr><td>Management Quality</td><td>Adequate — founder-run, no pledging, no SEBI issues, but opacity on subsidiaries and coal block timelines</td><td>3/5</td></tr>\n      <tr><td>Financial Quality</td><td>Mixed — CFO tracks PAT, but CCC of 379 days is a serious structural flaw</td><td>2.5/5</td></tr>\n      <tr><td>Growth Visibility</td><td>Strong — ₹700 Cr order book, Hind Metal ramp from FY27; coal block optionality</td><td>4/5</td></tr>\n      <tr><td>Valuation Attractiveness</td><td>Neutral at ₹222 — attractive below ₹185; stretched above ₹235</td><td>3/5</td></tr>\n      <tr><td>Risk Profile</td><td>High — small-cap, ASM, no institutions, coal dependency, working capital risk</td><td>2/5</td></tr>\n      <tr class=\"highlight-row\"><td><strong>Overall</strong></td><td><strong>ACCUMULATE on dips to ₹160–185. Avoid chasing above ₹235.</strong></td><td><strong>3.0/5</strong></td></tr>\n    </table>\n  </div>\n</div>\n\n<!-- FOOTER -->\n<div class=\"footer\">\n  <p><strong>DISCLAIMER:</strong> This investment memo is for informational and educational purposes only. It does not constitute investment advice, a solicitation, or a recommendation to buy or sell any security. All figures are sourced from publicly available information including company filings (BSE/NSE), earnings call transcripts, press releases, and market data as of April 8–11, 2026. Projections and scenarios are illustrative estimates — actual results may differ materially. Investing in small-cap equities carries a substantial risk of capital loss. Investors should conduct their own due diligence and consult a SEBI-registered investment advisor before making investment decisions. Past performance is not indicative of future returns. Check current ASM/GSM surveillance status before investing.</p>\n  <p style=\"margin-top:8px\">Prepared: April 11, 2026 &bull; Sources: SWPEL Quarterly Results (BSE/NSE), Annual Reports, Earnings Call Transcripts, CRISIL Rating Reports, Screener.in, Tickertape, Trade Brains, Business Standard, Business Upturn, ScanX.trade, 5Paisa, TradingView community analysis.</p>\n</div>\n\n</div>\n</body>\n</html>\n"},{"id":1,"month":"APR","year":"26","title":"Time Technoplast","subtitle":"From Plastic Drums to Composite Cylinders","tag":"Equity Research","type":"embedded","embedKey":"tt","link":"#","fileData":null},{"id":2,"month":"APR","year":"26","title":"Scoda Tubes","subtitle":"Speciality Pipes (Power Pipes)","tag":"Equity Research","type":"embedded","embedKey":"sc","link":"#","fileData":null}]/*WRITINGS_END*/;
let writings=[],adminUnlocked=false,editingId=null,currentFilter='all',currentFileData=null,currentLinkType='url';

function save(){/*save_noop*/}
function exportHTML(){/*EXPORT_PLACEHOLDER*/}
function load(){writings=[...DEFAULT_WRITINGS];}

function render(){
  const list=document.getElementById('writingsList');
  const filtered=currentFilter==='all'?writings:writings.filter(w=>w.month===currentFilter);
  list.innerHTML='';
  if(!filtered.length){list.innerHTML='<li style="padding:24px 8px;font-family:DM Mono,monospace;font-size:12px;color:var(--muted)">Is mahine koi writing nahi.</li>';return;}
  filtered.forEach(w=>{
    const li=document.createElement('li');
    li.className='writing-item'+(adminUnlocked?' admin-active':'');
    li.innerHTML=`
      <span class="writing-date">${w.day?w.day+' ':''}${w.month}.${w.year}</span>
      <span class="writing-content">
        <span class="writing-title">${escHtml(w.title)}</span>
        ${w.subtitle?`<span class="writing-subtitle">${escHtml(w.subtitle)}</span>`:''}
        ${w.tag?`<span class="writing-tag">${escHtml(w.tag)}</span>`:''}
      </span>
      <span class="writing-arrow">&#8594;</span>
      <span class="item-actions">
        <button class="action-icon" onclick="openEditModal(${w.id});event.stopPropagation()">edit</button>
        <button class="action-icon del" onclick="quickDelete(${w.id});event.stopPropagation()">delete</button>
      </span>`;
    li.addEventListener('click',e=>{
      if(e.target.closest('.item-actions')) return;
      let html='';
      if(w.type==='embedded'&&w.embedKey&&EMBEDDED[w.embedKey]) html=b64decode(EMBEDDED[w.embedKey]);
      else if((w.type==='file'||w.type==='editor')&&w.fileData) html=w.fileData;
      else if(w.type==='url'&&w.link&&w.link!=='#'){window.open(w.link,'_blank');return;}
      if(html) openArticle(w,html);
    });
    list.appendChild(li);
  });
}

function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function openArticle(w,html){
  document.getElementById('articleTitle').textContent=w.title;
  const fullHtml=html.trim().startsWith('<!DOCTYPE')||html.trim().startsWith('<html')?html:`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{font-family:Georgia,serif;max-width:860px;margin:0 auto;padding:40px 32px;line-height:1.8;font-size:16px;color:#111;}h1,h2,h3{font-family:Arial,sans-serif;}table{width:100%;border-collapse:collapse;margin:20px 0;}td,th{padding:8px 12px;border:1px solid #ddd;text-align:left;}th{background:#f5f5f5;}</style></head><body>${html}</body></html>`;
  document.getElementById('articleFrame').srcdoc=fullHtml;
  document.getElementById('articleOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeArticle(){
  document.getElementById('articleOverlay').classList.remove('open');
  document.getElementById('articleFrame').srcdoc='';
  document.body.style.overflow='';
}

function filterMonth(btn,month){document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=month;render();}

function openPasswordModal(){document.getElementById('pwInput').value='';document.getElementById('pwError').classList.remove('show');document.getElementById('pwOverlay').classList.add('open');setTimeout(()=>document.getElementById('pwInput').focus(),100);}

  if(document.getElementById('pwInput').value===ADMIN_PASSWORD){adminUnlocked=true;closeAll();document.getElementById('editBar').classList.add('show');render();}
  else{document.getElementById('pwError').classList.add('show');document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();}
