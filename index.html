function switchType(type){
  currentLinkType=type;
  ['url','file','editor'].forEach(t=>{
    document.getElementById('opt'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===type);
    document.getElementById(t+'Section').style.display=t===type?'block':'none';
  });
}

function switchEditorTab(tab){
  document.getElementById('tabCode').classList.toggle('active',tab==='code');
  document.getElementById('tabPreview').classList.toggle('active',tab==='preview');
  document.getElementById('htmlEditor').style.display=tab==='code'?'block':'none';
  const prev=document.getElementById('editorPreview');
  if(tab==='preview'){prev.classList.add('show');prev.innerHTML=document.getElementById('htmlEditor').value;}
  else{prev.classList.remove('show');}
}

function insertTag(tag){
  const ta=document.getElementById('htmlEditor');
  const start=ta.selectionStart,end=ta.selectionEnd;
  const sel=ta.value.substring(start,end);
  let insert='';
  if(tag==='h1') insert=`<h1>${sel||'Heading 1'}</h1>\n`;
  else if(tag==='h2') insert=`<h2>${sel||'Heading 2'}</h2>\n`;
  else if(tag==='h3') insert=`<h3>${sel||'Heading 3'}</h3>\n`;
  else if(tag==='p') insert=`<p>${sel||'Paragraph text yahan likhoo...'}</p>\n`;
  else if(tag==='b') insert=`<b>${sel||'bold text'}</b>`;
  else if(tag==='i') insert=`<i>${sel||'italic text'}</i>`;
  else if(tag==='hr') insert=`<hr>\n`;
  else if(tag==='a') insert=`<a href="https://">${sel||'link text'}</a>`;
  else if(tag==='ul-li') insert=`<ul>\n  <li>Item 1</li>\n  <li>Item 2</li>\n  <li>Item 3</li>\n</ul>\n`;
  else if(tag==='table') insert=`<table border="1" style="border-collapse:collapse;width:100%">\n  <tr><th>Column 1</th><th>Column 2</th><th>Column 3</th></tr>\n  <tr><td>Data</td><td>Data</td><td>Data</td></tr>\n</table>\n`;
  ta.value=ta.value.substring(0,start)+insert+ta.value.substring(end);
  ta.focus();ta.selectionStart=ta.selectionEnd=start+insert.length;
}

function fileSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{currentFileData=e.target.result;document.getElementById('fileChosen').style.display='block';document.getElementById('fileChosen').textContent='&#10003; '+file.name;};
  reader.readAsText(file);
}

function openAddModal(){
  editingId=null;currentFileData=null;
  document.getElementById('modalTitle').textContent='Add Writing';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('fMonth').value='APR';
  document.getElementById('fYear').value='26';
  document.getElementById('fDay').value='';
  ['fTitle','fSubtitle','fTag','fLink'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fFile').value='';
  document.getElementById('fileChosen').style.display='none';
  document.getElementById('htmlEditor').value='';
  document.getElementById('editorPreview').innerHTML='';
  switchType('url');
  switchEditorTab('code');
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}

function openEditModal(id){
  const w=writings.find(x=>x.id===id);if(!w)return;
  editingId=id;currentFileData=w.fileData||null;
  document.getElementById('modalTitle').textContent='Edit Writing';
  document.getElementById('deleteBtn').style.display='inline-block';
  document.getElementById('fMonth').value=w.month;
  document.getElementById('fYear').value=w.year;
  document.getElementById('fDay').value=w.day||'';
  document.getElementById('fTitle').value=w.title;
  document.getElementById('fSubtitle').value=w.subtitle||'';
  document.getElementById('fTag').value=w.tag||'';
  document.getElementById('fLink').value=w.link||'';
  document.getElementById('fFile').value='';
  document.getElementById('fileChosen').style.display='none';
  document.getElementById('editorPreview').innerHTML='';

  if(w.type==='editor'){
    document.getElementById('htmlEditor').value=w.fileData||'';
    switchType('editor');switchEditorTab('code');
  } else if(w.type==='file'){
    if(w.fileData){document.getElementById('fileChosen').style.display='block';document.getElementById('fileChosen').textContent='&#10003; file attached';}
    switchType('file');
  } else if(w.type==='embedded'){
    // show embedded content in editor for editing
    const decoded=w.embedKey&&EMBEDDED[w.embedKey]?b64decode(EMBEDDED[w.embedKey]):'';
    document.getElementById('htmlEditor').value=decoded;
    currentFileData=decoded;
    switchType('editor');switchEditorTab('code');
  } else{
    switchType('url');
  }
  document.getElementById('addOverlay').classList.add('open');
}

function saveWriting(){
  const month=document.getElementById('fMonth').value;
  const year=document.getElementById('fYear').value.trim();
  const day=document.getElementById('fDay').value.trim();
  const title=document.getElementById('fTitle').value.trim();
  const sub=document.getElementById('fSubtitle').value.trim();
  const tag=document.getElementById('fTag').value.trim();
  const link=document.getElementById('fLink').value.trim();
  const editorVal=document.getElementById('htmlEditor').value.trim();
  if(!title){alert('Title zaroori hai.');return;}
  if(currentLinkType==='url'&&!link){alert('URL zaroori hai.');return;}
  if(currentLinkType==='file'&&!currentFileData){alert('HTML file select karo.');return;}
  if(currentLinkType==='editor'&&!editorVal){alert('Editor mein kuch likhoo.');return;}
  const fd=currentLinkType==='file'?currentFileData:(currentLinkType==='editor'?editorVal:null);
  const entry={month,day,year,title,subtitle:sub,tag,type:currentLinkType==='editor'?'editor':currentLinkType,embedKey:null,link:currentLinkType==='url'?link:'#',fileData:fd};
  if(editingId!==null){const idx=writings.findIndex(w=>w.id===editingId);if(idx>-1)writings[idx]={id:editingId,...entry};}
  else{const newId=writings.length?Math.max(...writings.map(w=>w.id))+1:1;writings.unshift({id:newId,...entry});}
  save();closeAll();render();
}

function deleteEditing(){if(editingId===null)return;if(!confirm('Delete karna chahte ho?'))return;writings=writings.filter(w=>w.id!==editingId);save();closeAll();render();}
function quickDelete(id){if(!confirm('Delete karna chahte ho?'))return;writings=writings.filter(w=>w.id!==id);save();render();}
function closeAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeAll();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAll();closeArticle();}});
load();render();
</script>
